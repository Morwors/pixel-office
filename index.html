<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#16161a">
<title>Aleksa's AI Office</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#16161a;--sf:#242629;--sf2:#2e3035;--brd:#3a3d44;
  --tx:#fffffe;--dim:#94a1b2;--dim2:#72778a;
  --acc:#7f5af0;--acc2:#2cb67d;--warn:#ff8906;--err:#e53170;
  --bar:40px;--font:'Press Start 2P',monospace;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:var(--font);color:var(--tx);overflow:hidden;height:100dvh;width:100vw;user-select:none;-webkit-user-select:none;touch-action:manipulation;position:fixed;top:0;left:0}

/* TOP BAR */
#topBar{position:fixed;top:0;left:0;right:0;height:var(--bar);background:rgba(22,22,26,0.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:100}
#topBar .logo{color:var(--acc);font-size:clamp(7px,2vw,10px);display:flex;align-items:center;gap:6px}
#topBar .logo span{color:var(--dim)}
#topBar .info{color:var(--dim2);font-size:clamp(6px,1.4vw,8px);display:flex;gap:10px;align-items:center}

/* CANVAS */
#gameCanvas{position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;cursor:pointer;touch-action:none}

/* BOTTOM NAV */
#bottomNav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--bar) + var(--safe-b));padding-bottom:var(--safe-b);background:rgba(22,22,26,0.95);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-top:1px solid var(--brd);display:flex;align-items:center;justify-content:space-around;z-index:100}
.nav-btn{font-family:var(--font);font-size:clamp(6px,1.5vw,8px);color:var(--dim);background:none;border:none;cursor:pointer;padding:6px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s}
.nav-btn:active,.nav-btn.active{color:var(--acc)}
.nav-btn .ico{font-size:16px}

/* STATUS BAR */
#statusBar{position:fixed;bottom:calc(var(--bar) + var(--safe-b) + 8px);left:50%;transform:translateX(-50%);display:flex;gap:3px;background:rgba(36,38,41,0.92);border:1px solid var(--brd);border-radius:20px;padding:4px 10px;z-index:90;max-width:95vw;overflow-x:auto;scrollbar-width:none}
#statusBar::-webkit-scrollbar{display:none}
.sdot{display:flex;align-items:center;gap:3px;font-size:clamp(5px,1.1vw,6px);color:var(--dim);white-space:nowrap;padding:3px 6px;cursor:pointer;border-radius:10px;transition:background .15s}
.sdot:active{background:var(--sf2)}
.sdot .d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.d-w{background:var(--acc2);box-shadow:0 0 6px var(--acc2)}
.d-i{background:var(--warn);box-shadow:0 0 4px rgba(255,137,6,.5)}
.d-b{background:var(--acc);box-shadow:0 0 4px rgba(127,90,240,.5)}
.d-o{background:#555}

/* BOTTOM SHEET */
#sheet{position:fixed;left:0;right:0;bottom:calc(var(--bar) + var(--safe-b));max-height:72dvh;background:var(--sf);border-top:1px solid var(--brd);border-radius:16px 16px 0 0;z-index:150;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow:hidden;display:flex;flex-direction:column}
#sheet.open{transform:translateY(0)}
#sheetGrab{width:100%;padding:10px;display:flex;justify-content:center;cursor:grab;flex-shrink:0}
#sheetGrab::after{content:'';width:32px;height:4px;background:var(--brd);border-radius:2px}
#sheetBody{padding:0 16px 20px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}

.agent-card{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.agent-card .av{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.agent-card .info h2{font-size:clamp(8px,2.2vw,11px);margin-bottom:3px}
.agent-card .info .role{font-size:clamp(5px,1.3vw,7px);color:var(--dim)}

.pill{display:inline-block;padding:3px 10px;font-size:clamp(5px,1.2vw,7px);font-family:var(--font);border-radius:10px;margin:6px 0 10px}
.pill-w{background:rgba(44,182,125,.15);color:var(--acc2);border:1px solid rgba(44,182,125,.3)}
.pill-i{background:rgba(255,137,6,.12);color:var(--warn);border:1px solid rgba(255,137,6,.25)}
.pill-b{background:rgba(127,90,240,.12);color:var(--acc);border:1px solid rgba(127,90,240,.25)}
.pill-o{background:rgba(255,255,255,.05);color:var(--dim2);border:1px solid var(--brd)}

.task-box{font-size:clamp(6px,1.4vw,7px);color:var(--dim);padding:8px 10px;background:var(--sf2);border-radius:8px;margin-bottom:10px;border-left:3px solid var(--acc2)}

.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.pbtn{font-family:var(--font);font-size:clamp(6px,1.5vw,8px);padding:10px;background:var(--sf2);color:var(--tx);border:1px solid var(--brd);cursor:pointer;border-radius:8px;text-align:center;transition:background .15s,transform .1s}
.pbtn:active{transform:scale(.96);background:var(--brd)}
.pbtn.green{background:rgba(44,182,125,.15);border-color:rgba(44,182,125,.3);color:var(--acc2)}
.pbtn.red{background:rgba(229,49,112,.12);border-color:rgba(229,49,112,.25);color:var(--err)}
.pbtn.full{grid-column:1/-1}

.sfield{margin-bottom:8px}
.sfield label{font-size:clamp(5px,1.1vw,6px);color:var(--dim2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.sfield input{width:100%;padding:10px 12px;font-family:var(--font);font-size:clamp(7px,1.6vw,9px);background:var(--bg);color:var(--tx);border:1px solid var(--brd);border-radius:8px;outline:none;transition:border-color .2s}
.sfield input:focus{border-color:var(--acc)}

.log-section{margin-top:8px}
.log-section h3{font-size:clamp(5px,1.2vw,7px);color:var(--dim2);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.alog{max-height:120px;overflow-y:auto}
.le{font-size:clamp(5px,1.1vw,6px);color:var(--dim);padding:4px 0;border-bottom:1px solid rgba(58,61,68,.4);line-height:1.7}
.le .t{color:var(--dim2)}

/* MINIMAP */
#minimap{position:fixed;top:calc(var(--bar) + 8px);right:8px;width:100px;height:56px;background:rgba(22,22,26,.85);border:1px solid var(--brd);border-radius:6px;z-index:90;overflow:hidden}
#minimapCanvas{width:100%;height:100%;image-rendering:pixelated}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;animation:fi .2s ease}
@keyframes fi{from{opacity:0}}
.modal{background:var(--sf);border:1px solid var(--brd);border-radius:12px;padding:20px;width:100%;max-width:360px;animation:su .25s ease}
@keyframes su{from{transform:translateY(16px);opacity:0}}
.modal h2{font-size:clamp(8px,2vw,11px);color:var(--acc);margin-bottom:16px}
.modal .btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.color-row{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.csw{width:30px;height:30px;border:2px solid var(--brd);border-radius:6px;cursor:pointer;transition:transform .1s}
.csw.sel{border-color:var(--acc);box-shadow:0 0 10px rgba(127,90,240,.4);transform:scale(1.12)}

/* TOAST */
.toast{position:fixed;top:calc(var(--bar) + 10px);left:50%;transform:translateX(-50%);background:var(--sf2);border:1px solid var(--brd);padding:8px 16px;font-size:clamp(6px,1.4vw,8px);font-family:var(--font);color:var(--tx);z-index:300;border-radius:8px;animation:fi .3s ease,fo .3s ease 2.7s forwards;pointer-events:none;white-space:nowrap}
@keyframes fo{to{opacity:0;transform:translateX(-50%) translateY(-8px)}}

.notif{position:fixed;top:calc(var(--bar) + 10px);right:12px;background:var(--acc2);color:#000;font-family:var(--font);font-size:6px;padding:6px 10px;border-radius:8px;z-index:90;animation:fi .3s ease,fo .3s ease 3.7s forwards;pointer-events:none}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .5s}
#loading.hide{opacity:0;pointer-events:none}
#loading h1{font-size:clamp(10px,3vw,16px);color:var(--acc)}
#loading p{font-size:clamp(6px,1.5vw,8px);color:var(--dim)}
.ldots span{display:inline-block;width:8px;height:8px;background:var(--acc);margin:0 4px;border-radius:2px;animation:lb 1s infinite ease-in-out}
.ldots span:nth-child(2){animation-delay:.15s}
.ldots span:nth-child(3){animation-delay:.3s}
@keyframes lb{0%,80%,100%{transform:scaleY(.4)}40%{transform:scaleY(1)}}

/* EVENT FEED */
#feedPanel{position:fixed;left:0;right:0;bottom:calc(var(--bar) + var(--safe-b));max-height:60dvh;background:var(--sf);border-top:1px solid var(--brd);border-radius:16px 16px 0 0;z-index:150;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow:hidden;display:flex;flex-direction:column}
#feedPanel.open{transform:translateY(0)}
#feedPanel .grab{width:100%;padding:10px;display:flex;justify-content:center;flex-shrink:0}
#feedPanel .grab::after{content:'';width:32px;height:4px;background:var(--brd);border-radius:2px}
#feedBody{padding:0 16px 16px;overflow-y:auto;flex:1}
#feedBody h2{font-size:clamp(7px,1.8vw,9px);color:var(--acc);margin-bottom:10px}
.feed-item{font-size:clamp(5px,1.2vw,7px);color:var(--dim);padding:6px 0;border-bottom:1px solid rgba(58,61,68,.3);display:flex;gap:8px;align-items:flex-start}
.feed-item .fi-time{color:var(--dim2);flex-shrink:0;min-width:36px}
.feed-item .fi-emoji{flex-shrink:0}

@media(min-width:769px){
  #sheet{max-width:380px;right:8px;left:auto;border-radius:16px 16px 0 0}
  #feedPanel{max-width:340px;left:8px;right:auto}
  #minimap{width:130px;height:73px}
}
</style>
</head>
<body>
<div id="loading"><h1>🏢 AI Office</h1><p>Loading workspace...</p><div class="ldots"><span></span><span></span><span></span></div></div>

<div id="topBar">
  <div class="logo">🏢 <span>Aleksa's AI Office</span></div>
  <div class="info"><span id="clock">--:--</span><span id="date"></span></div>
</div>

<canvas id="gameCanvas"></canvas>
<div id="minimap"><canvas id="minimapCanvas"></canvas></div>
<div id="statusBar"></div>

<div id="sheet"><div id="sheetGrab"></div><div id="sheetBody"></div></div>
<div id="feedPanel"><div class="grab"></div><div id="feedBody"></div></div>

<div id="bottomNav">
  <button class="nav-btn active" onclick="navTo('home')"><span class="ico">🏠</span><span>Home</span></button>
  <button class="nav-btn" onclick="navTo('agents')"><span class="ico">👥</span><span>Agents</span></button>
  <button class="nav-btn" onclick="navTo('events')"><span class="ico">⚡</span><span>Events</span></button>
  <button class="nav-btn" onclick="navTo('add')"><span class="ico">➕</span><span>Add</span></button>
</div>

<script>
const C=document.getElementById('gameCanvas'),X=C.getContext('2d');
const MC=document.getElementById('minimapCanvas'),MX=MC.getContext('2d');

// ── WORLD ──
const W=960,H=540,PX=2;
let scale=1;

function resize(){
  const vw=window.innerWidth,vh=window.innerHeight;
  scale=Math.max(vw/(W*PX),vh/(H*PX));
  const cw=Math.floor(W*PX*scale),ch=Math.floor(H*PX*scale);
  C.width=W*PX;C.height=H*PX;
  C.style.width=cw+'px';C.style.height=ch+'px';
  C.style.left=Math.floor((vw-cw)/2)+'px';
  C.style.top=Math.floor((vh-ch)/2)+'px';
  MC.width=130;MC.height=73;
}
window.addEventListener('resize',resize);resize();

function p(x,y,w,h,c){X.fillStyle=c;X.fillRect(x*PX,y*PX,w*PX,h*PX)}
function mp(x,y,w,h,c){MX.fillStyle=c;MX.fillRect(x*.2,y*.2,Math.max(w*.2,1),Math.max(h*.2,1))}

// ── TIME ──
function ti(){const n=new Date();return{h:n.getHours(),m:n.getMinutes(),s:n.getSeconds(),now:n}}
function skyL(){const h=ti().h;if(h>=7&&h<18)return 1;if(h>=6&&h<7)return(h-6);if(h>=18&&h<20)return 1-(h-18)/2;return .15}

// ── COLORS ──
function lc(a,b,t){
  t=Math.max(0,Math.min(1,t));
  const r1=parseInt(a.slice(1,3),16),g1=parseInt(a.slice(3,5),16),b1=parseInt(a.slice(5,7),16);
  const r2=parseInt(b.slice(1,3),16),g2=parseInt(b.slice(3,5),16),b2_=parseInt(b.slice(5,7),16);
  return`rgb(${r1+(r2-r1)*t|0},${g1+(g2-g1)*t|0},${b1+(b2_-b1)*t|0})`
}
function lit(c,L){return lc(c,'#0a0a10',1-L)}

// ── OFFICE DRAWING ──
const FY=380; // floor Y

function drawOffice(){
  const L=skyL();

  // Sky through windows
  const skyTop=L>.5?'#5a8ed0':'#1a1a30';
  const skyBot=L>.5?'#8ec4f0':'#2a2a40';

  // Ceiling
  p(0,0,W,75,lit('#e8e4dd',L));
  // Ceiling lights
  for(let lx=80;lx<W;lx+=160){
    p(lx,70,80,4,lit('#d0d0d0',L));
    p(lx+5,66,70,4,lit('#f0f0f0',L));
    if(L>.3){X.fillStyle=`rgba(255,250,230,${.06*L})`;X.fillRect((lx-10)*PX,68*PX,100*PX,7*PX)}
  }

  // Wall
  p(0,75,W,90,lit('#f0ece4',L));
  // Accent stripe
  p(0,148,W,3,lit('#d4c8b4',L));
  // Baseboard
  p(0,160,W,4,lit('#8a7a60',L));

  // ── WINDOWS (4 large) ──
  const wins=[{x:50,w:100},{x:220,w:100},{x:420,w:100},{x:650,w:100}];
  wins.forEach(w=>{
    p(w.x,80,w.w,65,lit('#6a5a40',L));
    p(w.x+2,82,w.w-4,61,lit('#7a6a50',L));
    p(w.x+4,84,w.w-8,57,'#000');
    for(let i=0;i<57;i++){const t=i/57;p(w.x+4,84+i,w.w-8,1,lc(skyTop,skyBot,t))}
    p(w.x+4+Math.floor((w.w-8)/2)-1,84,2,57,lit('#7a6a50',L));
    p(w.x+4,84+27,w.w-8,2,lit('#7a6a50',L));
    if(L<.3){for(let s=0;s<5;s++){const sx=w.x+10+Math.floor(Math.sin(w.x+s*17)*((w.w-20)/2)+(w.w-20)/2);const sy=88+Math.floor(Math.cos(w.x+s*13)*20+20);p(sx,sy,1,1,'#fff')}}
    if(L>.5){X.fillStyle=`rgba(255,250,220,${.03*L})`;X.fillRect(w.x*PX,150*PX,w.w*PX,240*PX)}
    for(let b=0;b<8;b++){p(w.x+4,84+b*7,w.w-8,1,`rgba(200,190,170,${.3*L})`)}
  });

  // ── WALL DECOR ──
  // Whiteboard
  p(170,82,70,44,lit('#e0e0e0',L));p(171,83,68,42,lit('#f8f8f8',L));
  p(175,90,24,1,lit('#3060c0',L));p(175,96,36,1,lit('#c03030',L));
  p(175,102,18,1,lit('#308030',L));p(175,108,30,1,lit('#c0a020',L));
  p(210,90,20,10,lit('#e8e0d0',L));p(211,91,18,8,lit('#fff4a0',L));
  // Clock
  p(570,84,24,24,lit('#d0d0d0',L));p(571,85,22,22,lit('#f8f8f8',L));
  p(581,95,2,2,'#333');
  // Wall art
  p(790,82,60,44,lit('#2a2a2a',L));p(792,84,56,40,lit('#304060',L));
  p(800,92,14,10,lit('#6090c0',L));p(820,88,16,18,lit('#c06040',L));
  p(812,100,10,16,lit('#40a060',L));

  // ── FLOOR ──
  for(let fx=0;fx<W;fx+=20){
    for(let fy=FY;fy<H;fy+=20){
      const alt=((fx/20+fy/20)%2===0);
      p(fx,fy,20,20,lit(alt?'#585868':'#525262',L));
      if(Math.random()>.7)p(fx+Math.random()*18|0,fy+Math.random()*18|0,1,1,lit(alt?'#5e5e6e':'#4e4e5e',L));
    }
  }
  p(0,FY,W,1,lit('#484858',L));

  // Light pools
  if(L>.3){for(let lx=80;lx<W;lx+=160){X.fillStyle=`rgba(255,250,230,${.04*L})`;X.beginPath();X.ellipse((lx+40)*PX,(FY+60)*PX,70*PX,40*PX,0,0,Math.PI*2);X.fill()}}

  // ── DESK CLUSTERS (6 desks, spread across wider canvas) ──
  drawDeskCluster(50,FY-12,'L');
  drawDeskCluster(200,FY-12,'R');
  drawDeskCluster(380,FY-12,'L');
  drawDeskCluster(530,FY-12,'R');
  drawDeskCluster(700,FY-12,'L');
  drawDeskCluster(850,FY-12,'R');

  // ── MEETING ROOM ──
  drawMeetingRoom(780,164);

  // ── KITCHEN / BREAK AREA ──
  drawKitchen(20,FY+40);

  // ── LOUNGE ──
  drawLounge(360,FY+40);

  // ── SERVER RACK ──
  drawServerRack(890,FY+20);

  // ── PLANTS ──
  drawPlant(15,FY-40,'tall');
  drawPlant(170,FY-32,'small');
  drawPlant(350,FY-38,'tall');
  drawPlant(520,FY-30,'small');
  drawPlant(680,FY-36,'tall');
  drawPlant(760,FY-30,'small');
  drawPlant(920,FY-34,'tall');

  // ── ENTRY ──
  p(0,88,4,75,lit('#6a4020',L));
  p(4,90,20,71,lit('#8a5a30',L));
  p(5,91,18,69,lit('#a07040',L));
  p(20,124,3,4,lit('#d0a040',L));
  p(8,162,22,4,lit('#408040',L));

  // ── COAT RACK ──
  p(36,112,2,40,lit('#5a4a30',L));
  p(30,109,14,3,lit('#5a4a30',L));
  p(32,106,4,4,lit('#3060c0',L));
  p(38,106,4,4,lit('#c03030',L));
}

function drawDeskCluster(x,y,side){
  const L=skyL();
  // Desk surface (L-shape)
  p(x,y,50,4,lit('#c4a882',L));
  p(x+1,y+4,2,14,lit('#9a8060',L));p(x+47,y+4,2,14,lit('#9a8060',L)); // legs

  // Monitor
  p(x+8,y-18,16,14,lit('#2a2a2a',L));
  p(x+9,y-17,14,12,lit('#1a2a40',L)); // screen
  // Screen content
  const sc=Date.now()/2000;
  p(x+10,y-16,5,1,`hsl(${(sc*50+x)%360},60%,60%)`);
  p(x+10,y-14,8,1,lit('#4070a0',L));
  p(x+10,y-12,6,1,lit('#4070a0',L));
  p(x+10,y-10,10,1,lit('#306040',L));
  // Monitor stand
  p(x+14,y-4,4,4,lit('#2a2a2a',L));
  p(x+12,y,8,1,lit('#2a2a2a',L));

  // Keyboard
  p(x+8,y+1,12,3,lit('#d0d0d0',L));
  for(let k=0;k<5;k++)p(x+9+k*2,y+2,1,1,lit('#aaa',L));

  // Mouse
  p(x+24,y+1,3,4,lit('#c0c0c0',L));p(x+25,y+1,1,1,lit('#888',L));

  // Coffee cup
  p(x+38,y+1,4,3,lit('#f0f0f0',L));p(x+39,y,2,1,lit('#a07040',L));
  // Papers
  p(x+30,y+1,6,3,lit('#f8f4e8',L));

  // Chair
  const cx=x+16;
  p(cx,y+18,14,10,lit('#3a3a5a',L)); // seat
  p(cx+2,y+14,10,4,lit('#4a4a6a',L)); // back
  // Armrests
  p(cx-1,y+16,2,6,lit('#3a3a5a',L));
  p(cx+13,y+16,2,6,lit('#3a3a5a',L));
  // Wheels (subtle)
  p(cx+3,y+28,2,1,lit('#222',L));p(cx+9,y+28,2,1,lit('#222',L));

  // Second monitor (some desks)
  if(side==='L'){

const SHIRTS={purple:'#7f5af0',blue:'#3060c0',green:'#2cb67d',red:'#e53170',yellow:'#ff8906',orange:'#d06020',cyan:'#20a0b0',pink:'#c040a0'};

class Agent{
  constructor(n,sc,hc,role,spr){
    this.name=n;this.shirtColor=sc;this.hairColor=hc||'#402010';
    this.skinColor='#e8b880';this.pantsColor='#3a3a4a';this.role=role||'Agent';this.spr=spr||null;
    this.x=80+Math.random()*780;this.y=FY-6;this.tx=this.x;
    this.speed=.3+Math.random()*.15;this.dir=1;this.af=0;this.at=0;
    this.state='idle';this.status='idle';this.task='';
    this.bubble='';this.bt=0;this.coffee=false;this.desk=null;
    this.st=0;this.nb=3+Math.random()*8;this.log_=[];this._pend=null;
    this.log('Arrived at the office');
  }
  log(m){const t=ti();this.log_.unshift({time:`${String(t.h).padStart(2,'0')}:${String(t.m).padStart(2,'0')}`,msg:m});if(this.log_.length>30)this.log_.pop();addFeed(this.name,m)}
  say(t,d){this.bubble=t;this.bt=d||4}
  assignTask(t){this.task=t;this.status='working';this.state='walking';
    const desks=[50,200,380,530,700,850];const di=desks[Math.floor(Math.random()*desks.length)];
    this.desk=di;this.tx=di+20;this.say('On it! 💻',3);this.log('Started: '+t);updStatus()}
  makeIdle(){this.status='idle';this.state='idle';this.task='';this.desk=null;this.nb=2+Math.random()*5;this.st=0;this.say('Break time ☕',2);this.log('Now idle');updStatus()}
  makeOff(){this.status='offline';this.state='idle';this.task='';this.log('Went offline');updStatus()}
  update(dt){
    this.at+=dt;if(this.at>.18){this.af=(this.af+1)%4;this.at=0}
    if(this.bt>0){this.bt-=dt;if(this.bt<=0)this.bubble=''}
    this.st+=dt;
    if(this.status==='offline')return;
    if(this.state==='walking'){
      const dx=this.tx-this.x;const sp=this.coffee?this.speed*.6:this.speed;
      if(Math.abs(dx)>1){this.dir=dx>0?1:-1;this.x+=this.dir*sp*dt*60}
      else{this.x=this.tx;this.onArr()}
    }
    if(this.status==='idle'&&this.state!=='walking'){
      this.nb-=dt;if(this.nb<=0){this.pickIdle();this.nb=5+Math.random()*12}
    }
    if(this.status==='working'&&this.state==='working'&&this.st>25+Math.random()*35){
      this.say('Done! ✅',3);this.log('Completed: '+this.task);showNotif(this.name+' finished!');this.makeIdle()
    }
  }
  onArr(){
    if(this.status==='working'){this.state='working';this.st=0;return}
    if(this._pend==='coffee'){this.state='coffee';this.say('☕ Brewing...',3);this.log('Getting coffee');setTimeout(()=>{if(this.state==='coffee'){this.coffee=true;this.say('☕',2);this.state='idle'}},3000)}
    else if(this._pend==='couch'){this.state='sitting';this.say('😌',2);this.log('Relaxing on couch')}
    else if(this._pend==='water'){this.state='idle';this.say('💧',2);this.log('Hydrating')}
    else{this.state='idle'}
    this._pend=null
  }
  pickIdle(){
    const b=['wander','wander','coffee','couch','water','wander'][Math.random()*6|0];
    this._pend=b;this.state='walking';
    if(b==='coffee')this.tx=38;
    else if(b==='couch')this.tx=380+Math.random()*50;
    else if(b==='water')this.tx=650;
    else this.tx=40+Math.random()*860
  }
}

// ── DRAW AGENT ──
function drawAgent(a){
  const x=Math.round(a.x),y=a.y;
  const isSit=a.state==='working'||a.state==='sitting';
  const isWalk=a.state==='walking';
  const isMage=a.spr==='mage';
  const L=skyL();
  const bodyY=isSit?y-10:y-16;
  const legOff=isWalk?Math.sin(a.af*Math.PI/2)*2:0;

  if(a.status==='offline')X.globalAlpha=.35;

  // Shadow
  X.fillStyle='rgba(0,0,0,.18)';
  X.beginPath();X.ellipse((x+5)*PX,(y+2)*PX,7*PX,2*PX,0,0,Math.PI*2);X.fill();

  // Legs
  if(!isSit){
    p(x+2,bodyY+12,3,5+legOff,lit(a.pantsColor,L));
    p(x+7,bodyY+12,3,5-legOff,lit(a.pantsColor,L));
    p(x+1,bodyY+17+legOff,4,2,lit('#2a2020',L));
    p(x+7,bodyY+17-legOff,4,2,lit('#2a2020',L));
  }else{
    p(x+1,bodyY+12,4,3,lit(a.pantsColor,L));
    p(x+7,bodyY+12,4,3,lit(a.pantsColor,L))
  }

  // Body
  if(isMage){
    p(x+1,bodyY+4,10,8,lit(a.shirtColor,L));
    p(x,bodyY+8,12,4,lit(a.shirtColor,L));
    p(x+1,bodyY+11,10,1,lit('#f0c040',L));
  }else{
    p(x+1,bodyY+4,10,8,lit(a.shirtColor,L));
    // Collar
    p(x+4,bodyY+4,4,1,lc(a.shirtColor,'#ffffff',.3));
  }

  // Arms
  const aw=a.state==='working'?Math.sin(Date.now()/200)*1:0;
  p(a.dir===1?x+10:x-1,bodyY+5,2,6+aw,lit(a.shirtColor,L));
  p(a.dir===1?x-1:x+10,bodyY+5,2,6,lit(a.shirtColor,L));
  p(a.dir===1?x+10:x-1,bodyY+11,2,1,lit(a.skinColor,L));
  p(a.dir===1?x-1:x+10,bodyY+11,2,1,lit(a.skinColor,L));

  // Head
  p(x+1,bodyY-2,10,6,lit(a.skinColor,L));

  // Hair
  if(isMage){
    p(x,bodyY-4,12,3,lit(a.shirtColor,L));
    p(x+1,bodyY-6,10,3,lit(a.shirtColor,L));
    p(x+2,bodyY-8,8,2,lit(a.shirtColor,L));
    p(x+3,bodyY-9,6,2,lit(a.shirtColor,L));
    p(x+4,bodyY-10,4,1,lit(a.shirtColor,L));
    p(x+5,bodyY-11,2,1,lit('#f0c040',L)); // star
  }else{
    p(x+1,bodyY-3,10,2,lit(a.hairColor,L));
    p(a.dir===1?x+9:x+1,bodyY-1,2,3,lit(a.hairColor,L));
  }

  // Eyes
  const ex=a.dir===1?4:2;
  p(x+ex,bodyY,2,2,lit('#1a1a2a',L));
  p(x+ex+4,bodyY,2,2,lit('#1a1a2a',L));
  // Eye shine
  p(x+ex+1,bodyY,1,1,'rgba(255,255,255,.6)');
  p(x+ex+5,bodyY,1,1,'rgba(255,255,255,.6)');
  // Mouth
  p(x+5,bodyY+3,3,1,lit('#c08060',L));

  // Coffee
  if(a.coffee){
    const cx=a.dir===1?x+11:x-4;
    p(cx,bodyY+9,3,3,lit('#f0f0f0',L));p(cx+1,bodyY+8,1,1,lit('#a07040',L))
  }

  X.globalAlpha=1;

  // Name label
  X.font=`${4*PX}px 'Press Start 2P',monospace`;
  const nm=X.measureText(a.name);const nw=nm.width/PX;const nx=x+5-nw/2;
  // Background pill
  const py=bodyY-16;
  X.fillStyle='rgba(22,22,26,.8)';
  const pad=3;
  X.beginPath();X.roundRect((nx-pad)*PX,(py-5)*PX,(nw+pad*2)*PX,9*PX,3*PX);X.fill();
  // Status line
  X.fillStyle=a.status==='working'?'rgba(44,182,125,.6)':a.status==='offline'?'rgba(85,85,85,.5)':'rgba(255,137,6,.5)';
  X.fillRect((nx-pad)*PX,(py+4)*PX,(nw+pad*2)*PX,PX);
  // Text
  X.fillStyle='#fff';X.fillText(a.name,nx*PX,(py)*PX);

  // Bubble
  if(a.bubble)drawBub(x+5,py-10,a.bubble);
  else if(a.state==='working'&&a.task){
    const tt=a.task.length>20?a.task.substring(0,20)+'…':a.task;
    drawBub(x+5,py-10,tt)
  }

  // Minimap dot
  const mc=a.status==='working'?'#2cb67d':a.status==='offline'?'#555':'#ff8906';
  mp(x,y-4,6,6,mc);
}

function drawBub(x,y,text){
  X.font=`${3*PX}px 'Press Start 2P',monospace`;
  const m=X.measureText(text);const bw=m.width/PX+10;const bh=10;
  const bx=x-bw/2;const by=y-bh;
  X.fillStyle='rgba(36,38,41,.92)';
  X.beginPath();X.roundRect(bx*PX,by*PX,bw*PX,bh*PX,4*PX);X.fill();
  X.strokeStyle='rgba(58,61,68,.6)';X.lineWidth=PX*.5;X.stroke();
  // Tail
  X.fillStyle='rgba(36,38,41,.92)';
  X.beginPath();X.moveTo((x-2)*PX,(by+bh)*PX);X.lineTo(x*PX,(by+bh+3)*PX);X.lineTo((x+2)*PX,(by+bh)*PX);X.fill();
  X.fillStyle='#e0e0e0';X.fillText(text,(bx+5)*PX,(by+7)*PX);
}

    if(document.activeElement?.id==='tin')subTask();
    if(document.activeElement?.id==='min')subMsg();
    if(document.activeElement?.id==='bMsg')doBcast();
    if(document.activeElement?.id==='nName')doAdd();
  }
});

// ── STATUS BAR ──
function updStatus(){
  document.getElementById('statusBar').innerHTML=agents.map((a,i)=>{
    const dc=a.status==='working'?'d-w':a.status==='offline'?'d-o':a.status==='break'?'d-b':'d-i';
    return`<div class="sdot" onclick="openSheet(agents[${i}])"><div class="d ${dc}"></div><span>${a.name.split(' ')[0]}</span></div>`
  }).join('')
}
updStatus();

// ── NAV ──
function navTo(tab){
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',['home','agents','events','add'][i]===tab));
  closeSheet();closeFeed();
  if(tab==='agents')showAgentList();
  if(tab==='events'){showFeed()}
  if(tab==='add')showAddModal();
}
function showAgentList(){
  // Open sheet with all agents
  const sb=document.getElementById('sheetBody');
  sb.innerHTML='<h2 style="font-size:clamp(8px,2vw,11px);color:var(--acc);margin-bottom:12px">👥 All Agents</h2>'+
    agents.map((a,i)=>{
      const ps=a.status==='working'?'pill-w':a.status==='offline'?'pill-o':'pill-i';
      return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--brd);cursor:pointer" onclick="openSheet(agents[${i}])">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:32px;height:32px;border-radius:8px;background:${a.shirtColor};display:flex;align-items:center;justify-content:center;font-size:14px">${a.spr==='mage'?'🧙‍♂️':'👤'}</div>
          <div><div style="font-size:clamp(6px,1.5vw,8px)">${a.name}</div><div style="font-size:clamp(5px,1.1vw,6px);color:var(--dim)">${a.role}</div></div>
        </div>
        <span class="pill ${ps}" style="margin:0">${a.status}</span>
      </div>`
    }).join('');
  sheet.classList.add('open');selAgent=null
}

// ── FEED ──
function showFeed(){
  const fb=document.getElementById('feedBody');
  fb.innerHTML='<h2>⚡ Activity Feed</h2>'+
    feed.slice(0,30).map(f=>`<div class="feed-item"><span class="fi-time">${f.time}</span><span class="fi-emoji">${f.emoji}</span><span><b>${f.name}</b> ${f.msg}</span></div>`).join('');
  document.getElementById('feedPanel').classList.add('open')
}
function closeFeed(){document.getElementById('feedPanel').classList.remove('open')}

// ── MODALS ──
function showAddModal(){
  const colors=Object.entries(SHIRTS);
  const ov=document.createElement('div');ov.className='modal-ov';
  ov.onclick=e=>{if(e.target===ov)ov.remove()};
  ov.innerHTML=`<div class="modal"><h2>➕ New Agent</h2>
    <div class="sfield"><label>Name</label><input id="nName" type="text" placeholder="Agent name..."/></div>
    <div class="sfield"><label>Role</label><input id="nRole" type="text" placeholder="Role..."/></div>
    <div class="sfield"><label>Color</label><div class="color-row">${colors.map(([n,c])=>`<div class="csw${n==='purple'?' sel':''}" data-color="${c}" style="background:${c}" onclick="document.querySelectorAll('.csw').forEach(s=>s.classList.remove('sel'));this.classList.add('sel')"></div>`).join('')}</div></div>
    <div class="btn-row"><button class="pbtn" onclick="this.closest('.modal-ov').remove()">Cancel</button><button class="pbtn green" onclick="doAdd()">Add</button></div></div>`;
  document.body.appendChild(ov)
}
function doAdd(){
  const n=document.getElementById('nName')?.value.trim();const r=document.getElementById('nRole')?.value.trim();
  const s=document.querySelector('.csw.sel');if(!n){showToast('❌ Enter a name');return}
  const c=s?s.dataset.color:'#888';
  const hairs=['#402010','#804020','#202020','#c0a040','#603010'];
  agents.push(new Agent(n,c,hairs[Math.random()*hairs.length|0],r||'Agent'));
  document.querySelector('.modal-ov')?.remove();showToast('✅ '+n+' joined!');updStatus()
}
function showBcastModal(){
  const ov=document.createElement('div');ov.className='modal-ov';
  ov.onclick=e=>{if(e.target===ov)ov.remove()};
  ov.innerHTML=`<div class="modal"><h2>📢 Broadcast</h2>
    <div class="sfield"><label>Message</label><input id="bMsg" type="text" placeholder="Hey everyone..."/></div>
    <div class="btn-row"><button class="pbtn" onclick="this.closest('.modal-ov').remove()">Cancel</button><button class="pbtn green" onclick="doBcast()">Send</button></div></div>`;
  document.body.appendChild(ov)
}
function doBcast(){
  const m=document.getElementById('bMsg')?.value.trim();if(!m)return;
  agents.forEach(a=>{if(a.status!=='offline')setTimeout(()=>{a.say(m,4);a.log('Broadcast: "'+m+'"')},Math.random()*1000)});
  document.querySelector('.modal-ov')?.remove();showToast('📢 Sent!')
}

function showToast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}
function showNotif(m){const n=document.createElement('div');n.className='notif';n.textContent='✅ '+m;document.body.appendChild(n);setTimeout(()=>n.remove(),4000)}

// ── GAME LOOP ──
let lt=0,fc=0,ft=0;
function loop(ts){
  const dt=Math.min((ts-lt)/1000,.1);lt=ts;
  fc++;ft+=dt;if(ft>=1){document.getElementById('bottomNav').querySelector('.nav-btn').title=fc+' FPS';fc=0;ft=0}
  const t=ti();
  document.getElementById('clock').textContent=`${String(t.h).padStart(2,'0')}:${String(t.m).padStart(2,'0')}`;
  const days=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  document.getElementById('date').textContent=days[t.now.getDay()]+' '+t.now.getDate();
  nextEv-=dt;if(nextEv<=0){trigEv();nextEv=20+Math.random()*40}
  agents.forEach(a=>a.update(dt));

  // Main canvas
  X.clearRect(0,0,C.width,C.height);
  drawOffice();
  [...agents].sort((a,b)=>a.y-b.y).forEach(a=>drawAgent(a));

  // Minimap
  MX.fillStyle='#16161a';MX.fillRect(0,0,130,73);
  MX.fillStyle='rgba(88,88,104,.4)';MX.fillRect(0,FY*73/H,130,73-FY*73/H);
  agents.forEach(a=>{
    MX.fillStyle=a.status==='working'?'#2cb67d':a.status==='offline'?'#555':'#ff8906';
    MX.fillRect(a.x*130/W,(a.y-10)*73/H,3,3)
  });

  requestAnimationFrame(loop)
}

window.addEventListener('load',()=>{setTimeout(()=>{document.getElementById('loading').classList.add('hide');setTimeout(()=>document.getElementById('loading').remove(),500)},600)});
requestAnimationFrame(loop);
</script>
