<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aleksa's AI Office</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1a2e;
  font-family: 'Press Start 2P', monospace;
  overflow: hidden;
  height: 100vh;
  color: #e0e0e0;
  user-select: none;
}

#topBar {
  position: fixed; top: 0; left: 0; right: 0; height: 40px;
  background: linear-gradient(180deg, #2a1a3e 0%, #1a1a2e 100%);
  border-bottom: 2px solid #4a3a5e;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; z-index: 100;
  font-size: 8px;
}

#topBar .office-name { color: #f0c040; font-size: 10px; text-shadow: 1px 1px 0 #000; }
#topBar .info { color: #a0a0c0; font-size: 7px; }
#topBar .info span { margin-left: 12px; }

#gameCanvas {
  position: fixed; top: 40px; left: 0;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  cursor: pointer;
}

#bottomBar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 44px;
  background: linear-gradient(0deg, #2a1a3e 0%, #1a1a2e 100%);
  border-top: 2px solid #4a3a5e;
  display: flex; align-items: center; padding: 0 12px; z-index: 100;
  gap: 8px;
}

.pixel-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px; padding: 6px 10px;
  background: #3a2a5e; color: #e0d0f0;
  border: 2px solid #6a5a8e; cursor: pointer;
  text-transform: uppercase;
  transition: all 0.1s;
}
.pixel-btn:hover { background: #5a4a7e; border-color: #8a7aae; transform: translateY(-1px); }
.pixel-btn:active { transform: translateY(1px); }
.pixel-btn.danger { background: #5e2a2a; border-color: #8e5a5a; color: #f0d0d0; }
.pixel-btn.success { background: #2a5e2a; border-color: #5a8e5a; color: #d0f0d0; }

#sidePanel {
  position: fixed; top: 40px; right: -340px; width: 340px;
  bottom: 44px; background: #1e1e32;
  border-left: 2px solid #4a3a5e;
  z-index: 100; transition: right 0.3s ease;
  overflow-y: auto; padding: 12px;
  scrollbar-width: thin; scrollbar-color: #4a3a5e #1e1e32;
}
#sidePanel.open { right: 0; }

#sidePanel h2 { font-size: 10px; color: #f0c040; margin-bottom: 12px; text-shadow: 1px 1px 0 #000; }
#sidePanel h3 { font-size: 8px; color: #c0b0e0; margin: 10px 0 6px; }
#sidePanel .agent-avatar { text-align: center; margin-bottom: 10px; }
#sidePanel .agent-avatar canvas { image-rendering: pixelated; border: 2px solid #4a3a5e; }

.panel-field { margin-bottom: 8px; }
.panel-field label { font-size: 7px; color: #8080a0; display: block; margin-bottom: 4px; }
.panel-field input, .panel-field select, .panel-field textarea {
  width: 100%; padding: 6px 8px;
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  background: #2a2a44; color: #e0e0e0;
  border: 2px solid #4a3a5e; outline: none;
}
.panel-field input:focus, .panel-field textarea:focus { border-color: #8a7aae; }
.panel-field textarea { resize: vertical; min-height: 40px; }

.status-badge {
  display: inline-block; padding: 3px 8px; font-size: 7px;
  border-radius: 2px; margin-bottom: 8px;
}
.status-badge.working { background: #2a5e2a; color: #80ff80; }
.status-badge.idle { background: #5e5e2a; color: #ffff80; }
.status-badge.offline { background: #5e2a2a; color: #ff8080; }
.status-badge.break { background: #2a4a5e; color: #80c0ff; }

.activity-log { max-height: 200px; overflow-y: auto; }
.activity-log .log-entry {
  font-size: 6px; color: #8080a0; padding: 4px 0;
  border-bottom: 1px solid #2a2a44;
  line-height: 1.6;
}
.activity-log .log-entry .time { color: #6060a0; }

.btn-row { display: flex; gap: 6px; margin: 8px 0; flex-wrap: wrap; }

#closePanel {
  position: absolute; top: 8px; right: 8px;
  background: none; border: none; color: #8080a0;
  font-size: 14px; cursor: pointer; font-family: monospace;
}
#closePanel:hover { color: #ff8080; }

/* Modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 200;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: #1e1e32; border: 2px solid #4a3a5e;
  padding: 20px; min-width: 300px; max-width: 400px;
}
.modal h2 { font-size: 10px; color: #f0c040; margin-bottom: 16px; }
.modal .btn-row { justify-content: flex-end; margin-top: 16px; }

/* Toast */
.toast {
  position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
  background: #3a2a5e; border: 2px solid #6a5a8e;
  padding: 8px 16px; font-size: 7px; color: #e0d0f0;
  font-family: 'Press Start 2P', monospace; z-index: 300;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s;
  pointer-events: none;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-10px); } }

.color-picker-row { display: flex; gap: 4px; flex-wrap: wrap; margin: 4px 0; }
.color-swatch {
  width: 20px; height: 20px; border: 2px solid #4a3a5e; cursor: pointer;
}
.color-swatch.selected { border-color: #f0c040; box-shadow: 0 0 4px #f0c040; }
</style>
</head>
<body>

<div id="topBar">
  <div class="office-name">🏢 Aleksa's AI Office</div>
  <div class="info">
    <span id="clockDisplay">12:00</span>
    <span id="agentCount">5 agents</span>
    <span id="dateDisplay"></span>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="bottomBar">
  <button class="pixel-btn" onclick="showAddAgentModal()">+ Add Agent</button>
  <button class="pixel-btn" onclick="showBroadcastModal()">📢 Broadcast</button>
  <button class="pixel-btn" onclick="triggerRandomEvent()">🎲 Event</button>
  <div style="flex:1"></div>
  <span style="font-size:6px;color:#6060a0" id="fpsDisplay">30 FPS</span>
</div>

<div id="sidePanel">
  <button id="closePanel" onclick="closePanel()">✕</button>
  <div id="panelContent"></div>
</div>

<script>
// ============================================================
// PIXEL OFFICE - The Sims meets AI Agent Dashboard
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Pixel scale factor
const PX = 3;

// Office dimensions (in virtual pixels)
const OFFICE_W = 320;
const OFFICE_H = 200;

// Actual canvas size
let canvasW, canvasH, scale;

function resize() {
  const availW = window.innerWidth;
  const availH = window.innerHeight - 84;
  scale = Math.min(availW / (OFFICE_W * PX), availH / (OFFICE_H * PX));
  canvasW = Math.floor(OFFICE_W * PX * scale);
  canvasH = Math.floor(OFFICE_H * PX * scale);
  canvas.width = OFFICE_W * PX;
  canvas.height = OFFICE_H * PX;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  canvas.style.left = Math.floor((availW - canvasW) / 2) + 'px';
  canvas.style.top = Math.floor(40 + (availH - canvasH) / 2) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// UTILITY: Draw a pixel rectangle
// ============================================================
function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * PX, y * PX, w * PX, h * PX);
}

function pxRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * PX, y * PX, w * PX, h * PX);
}

// Draw pixel text (using canvas text but styled retro)
function pxText(text, x, y, color, size) {
  ctx.fillStyle = color || '#fff';
  ctx.font = `${(size || 4) * PX}px 'Press Start 2P', monospace`;
  ctx.fillText(text, x * PX, y * PX);
}

function pxTextCenter(text, x, y, color, size) {
  ctx.fillStyle = color || '#fff';
  ctx.font = `${(size || 4) * PX}px 'Press Start 2P', monospace`;
  const m = ctx.measureText(text);
  ctx.fillText(text, x * PX - m.width / 2, y * PX);
}

// ============================================================
// TIME & DAY/NIGHT
// ============================================================
function getTimeInfo() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();
  return { h, m, s, now };
}

function getSkyColor() {
  const { h } = getTimeInfo();
  if (h >= 6 && h < 8) return { top: '#ff9966', bot: '#ffcc99', light: 0.5 + (h - 6) * 0.25 };
  if (h >= 8 && h < 17) return { top: '#4a90d9', bot: '#87ceeb', light: 1 };
  if (h >= 17 && h < 19) return { top: '#ff6633', bot: '#ffaa66', light: 1 - (h - 17) * 0.25 };
  if (h >= 19 && h < 21) return { top: '#2a1a4e', bot: '#4a3a6e', light: 0.3 };
  return { top: '#0a0a1e', bot: '#1a1a3e', light: 0.15 };
}

// ============================================================
// OFFICE LAYOUT - Furniture positions
// ============================================================
const FLOOR_Y = 160;
const WALL_Y = 40;
const CEILING_Y = 30;

const furniture = {
  desks: [
    { x: 30, y: FLOOR_Y - 20, id: 'desk0' },
    { x: 70, y: FLOOR_Y - 20, id: 'desk1' },
    { x: 110, y: FLOOR_Y - 20, id: 'desk2' },
    { x: 170, y: FLOOR_Y - 20, id: 'desk3' },
    { x: 210, y: FLOOR_Y - 20, id: 'desk4' },
    { x: 250, y: FLOOR_Y - 20, id: 'desk5' },
  ],
  couch: { x: 140, y: FLOOR_Y - 16, id: 'couch' },
  coffeeMachine: { x: 280, y: FLOOR_Y - 22, id: 'coffee' },
  waterCooler: { x: 295, y: FLOOR_Y - 20, id: 'water' },
  plants: [
    { x: 10, y: FLOOR_Y - 24 },
    { x: 155, y: FLOOR_Y - 26 },
    { x: 305, y: FLOOR_Y - 24 },
  ],
  whiteboard: { x: 90, y: WALL_Y + 6 },
  door: { x: 5, y: WALL_Y + 2 },
  clock: { x: 200, y: WALL_Y + 4 },
  windows: [
    { x: 50, y: WALL_Y + 2 },
    { x: 150, y: WALL_Y + 2 },
    { x: 240, y: WALL_Y + 2 },
  ],
};

// ============================================================
// AGENT DEFINITIONS
// ============================================================
const AGENT_COLORS = [
  '#e84040', '#4080e8', '#40b840', '#e8b040', '#b040e8',
  '#e87040', '#40c8e8', '#e84088', '#80b840', '#c0c0c0',
];

const SHIRT_PRESETS = {
  purple: '#7030a0', blue: '#3060c0', green: '#308030',
  red: '#c03030', yellow: '#c0a020', orange: '#d06020',
  cyan: '#20a0a0', pink: '#c04080',
};

class Agent {
  constructor(name, shirtColor, hairColor, role, specialSprite) {
    this.name = name;
    this.shirtColor = shirtColor;
    this.hairColor = hairColor || '#402010';
    this.skinColor = '#e8b880';
    this.pantsColor = '#304060';
    this.role = role || 'Agent';
    this.specialSprite = specialSprite || null;

    this.x = 60 + Math.random() * 200;
    this.y = FLOOR_Y;
    this.targetX = this.x;
    this.targetY = this.y;
    this.speed = 0.4 + Math.random() * 0.2;
    this.baseSpeed = this.speed;
    this.direction = 1;
    this.animFrame = 0;
    this.animTimer = 0;

    this.state = 'idle'; // idle, walking, working, break, talking, coffee, sitting
    this.status = 'idle'; // working, idle, offline
    this.task = '';
    this.speechBubble = '';
    this.speechTimer = 0;
    this.hasCoffee = false;

    this.assignedDesk = null;
    this.stateTimer = 0;
    this.nextBehaviorTime = 3 + Math.random() * 8;
    this.activityLog = [];
    this.talkPartner = null;

    this.log('Arrived at the office');
  }

  log(msg) {
    const t = getTimeInfo();
    const ts = `${String(t.h).padStart(2,'0')}:${String(t.m).padStart(2,'0')}`;
    this.activityLog.unshift({ time: ts, msg });
    if (this.activityLog.length > 30) this.activityLog.pop();
  }

  say(text, duration) {
    this.speechBubble = text;
    this.speechTimer = duration || 4;
  }

  assignTask(task) {
    this.task = task;
    this.status = 'working';
    this.state = 'walking';
    // Find a free desk
    const freeDesks = furniture.desks.filter(d =>
      !agents.some(a => a !== this && a.assignedDesk === d.id && a.status === 'working')
    );
    const desk = freeDesks.length > 0 ? freeDesks[Math.floor(Math.random() * freeDesks.length)] : furniture.desks[0];
    this.assignedDesk = desk.id;
    this.targetX = desk.x + 10;
    this.targetY = FLOOR_Y;
    this.say('On it! 💻', 3);
    this.log(`Started: ${task}`);
  }

  makeIdle() {
    this.status = 'idle';
    this.state = 'idle';
    this.task = '';
    this.assignedDesk = null;
    this.nextBehaviorTime = 2 + Math.random() * 5;
    this.stateTimer = 0;
    this.say('Taking a break ☕', 2);
    this.log('Now idle');
  }

  makeOffline() {
    this.status = 'offline';
    this.state = 'idle';
    this.task = '';
    this.log('Went offline');
  }

  update(dt) {
    this.animTimer += dt;
    if (this.animTimer > 0.2) {
      this.animFrame = (this.animFrame + 1) % 4;
      this.animTimer = 0;
    }

    if (this.speechTimer > 0) {
      this.speechTimer -= dt;
      if (this.speechTimer <= 0) this.speechBubble = '';
    }

    this.stateTimer += dt;

    if (this.status === 'offline') return;

    // Movement
    if (this.state === 'walking') {
      const dx = this.targetX - this.x;
      const spd = this.hasCoffee ? this.speed * 0.6 : this.speed;
      if (Math.abs(dx) > 1) {
        this.direction = dx > 0 ? 1 : -1;
        this.x += this.direction * spd * dt * 60;
      } else {
        this.x = this.targetX;
        this.onArrived();
      }
    }

    // Behavior timer (for idle agents)
    if (this.status === 'idle' && this.state !== 'walking') {
      this.nextBehaviorTime -= dt;
      if (this.nextBehaviorTime <= 0) {
        this.pickIdleBehavior();
        this.nextBehaviorTime = 5 + Math.random() * 10;
      }
    }

    // Working timeout (simulated tasks finishing)
    if (this.status === 'working' && this.state === 'working') {
      if (this.stateTimer > 20 + Math.random() * 30) {
        this.say('Done! ✅', 3);
        this.log(`Completed: ${this.task}`);
        this.makeIdle();
      }
    }
  }

  onArrived() {
    if (this.status === 'working') {
      this.state = 'working';
      this.stateTimer = 0;
    } else if (this._pendingAction === 'coffee') {
      this.state = 'coffee';
      this.stateTimer = 0;
      this.say('☕ Brewing...', 3);
      this.log('Getting coffee');
      setTimeout(() => {
        if (this.state === 'coffee') {
          this.hasCoffee = true;
          this.say('Coffee time! ☕', 2);
          this.state = 'idle';
          this._pendingAction = null;
        }
      }, 3000);
    } else if (this._pendingAction === 'couch') {
      this.state = 'sitting';
      this.stateTimer = 0;
      this.say('😌 Relaxing', 2);
      this.log('Sitting on the couch');
      this._pendingAction = null;
    } else if (this._pendingAction === 'water') {
      this.state = 'idle';
      this.stateTimer = 0;
      this.say('💧 Hydrating', 2);
      this.log('At the water cooler');
      this._pendingAction = null;
    } else if (this._pendingAction === 'wander') {
      this.state = 'idle';
      this._pendingAction = null;
    } else {
      this.state = 'idle';
    }
  }

  pickIdleBehavior() {
    const behaviors = ['wander', 'wander', 'coffee', 'couch', 'water', 'wander'];
    const b = behaviors[Math.floor(Math.random() * behaviors.length)];
    this._pendingAction = b;
    this.state = 'walking';

    switch (b) {
      case 'coffee':
        this.targetX = furniture.coffeeMachine.x + 2;
        break;
      case 'couch':
        this.targetX = furniture.couch.x + Math.random() * 16;
        break;
      case 'water':
        this.targetX = furniture.waterCooler.x + 2;
        break;
      default:
        this.targetX = 20 + Math.random() * 280;
        break;
    }
  }
}

// ============================================================
// AGENTS SETUP
// ============================================================
let agents = [
  new Agent('Supreme Magus', '#7030a0', '#2a1040', 'AI Wizard', 'mage'),
  new Agent('Research Bot', '#3060c0', '#804020', 'Researcher'),
  new Agent('Code Monkey', '#308030', '#202020', 'Developer'),
  new Agent('Data Cruncher', '#c03030', '#603010', 'Analyst'),
  new Agent('Pixel Pete', '#c0a020', '#c0a040', 'Office Mgr'),
];

// Give some initial tasks
agents[0].assignTask('Orchestrating agent workflows');
agents[2].assignTask('Refactoring the main module');

// ============================================================
// DRAWING FUNCTIONS
// ============================================================

function drawSky() {
  const sky = getSkyColor();
  // Gradient sky in windows
  for (let i = 0; i < 20; i++) {
    const t = i / 20;
    const r1 = parseInt(sky.top.slice(1,3), 16);
    const g1 = parseInt(sky.top.slice(3,5), 16);
    const b1 = parseInt(sky.top.slice(5,7), 16);
    const r2 = parseInt(sky.bot.slice(1,3), 16);
    const g2 = parseInt(sky.bot.slice(3,5), 16);
    const b2 = parseInt(sky.bot.slice(5,7), 16);
    const r = Math.floor(r1 + (r2 - r1) * t);
    const g = Math.floor(g1 + (g2 - g1) * t);
    const b = Math.floor(b1 + (b2 - b1) * t);
    px(0, CEILING_Y - 20 + i, OFFICE_W, 1, `rgb(${r},${g},${b})`);
  }
}

function drawOffice() {
  const sky = getSkyColor();
  const light = sky.light;

  // Sky behind windows
  drawSky();

  // Ceiling
  px(0, CEILING_Y, OFFICE_W, 2, lerpColor('#5a4a3a', '#2a2018', 1 - light));

  // Wall
  const wallColor = lerpColor('#d4c4a8', '#6a6050', 1 - light);
  px(0, CEILING_Y + 2, OFFICE_W, WALL_Y - CEILING_Y + 38, wallColor);

  // Wall accent stripe
  px(0, WALL_Y + 28, OFFICE_W, 2, lerpColor('#b0a080', '#584830', 1 - light));

  // Floor
  for (let x = 0; x < OFFICE_W; x += 8) {
    const shade = (Math.floor(x / 8) % 2 === 0) ? '#8a7a60' : '#7a6a50';
    px(x, FLOOR_Y, 8, 40, lerpColor(shade, '#3a3020', 1 - light));
  }
  // Floor line
  px(0, FLOOR_Y, OFFICE_W, 1, lerpColor('#6a5a40', '#2a2010', 1 - light));

  // Baseboard
  px(0, WALL_Y + 30, OFFICE_W, 2, lerpColor('#6a5a3a', '#3a2a18', 1 - light));

  // Windows
  furniture.windows.forEach(w => drawWindow(w.x, w.y, light));

  // Door
  drawDoor(furniture.door.x, furniture.door.y, light);

  // Whiteboard
  drawWhiteboard(furniture.whiteboard.x, furniture.whiteboard.y, light);

  // Clock
  drawClock(furniture.clock.x, furniture.clock.y);

  // Desks
  furniture.desks.forEach(d => drawDesk(d.x, d.y, light));

  // Couch
  drawCouch(furniture.couch.x, furniture.couch.y, light);

  // Coffee machine
  drawCoffeeMachine(furniture.coffeeMachine.x, furniture.coffeeMachine.y, light);

  // Water cooler
  drawWaterCooler(furniture.waterCooler.x, furniture.waterCooler.y, light);

  // Plants
  furniture.plants.forEach(p => drawPlant(p.x, p.y, light));
}

function lerpColor(c1, c2, t) {
  t = Math.max(0, Math.min(1, t));
  const r1 = parseInt(c1.slice(1,3), 16), g1 = parseInt(c1.slice(3,5), 16), b1 = parseInt(c1.slice(5,7), 16);
  const r2 = parseInt(c2.slice(1,3), 16), g2 = parseInt(c2.slice(3,5), 16), b2 = parseInt(c2.slice(5,7), 16);
  const r = Math.floor(r1 + (r2 - r1) * t);
  const g = Math.floor(g1 + (g2 - g1) * t);
  const b = Math.floor(b1 + (b2 - b1) * t);
  return `rgb(${r},${g},${b})`;
}

function drawWindow(x, y, light) {
  px(x, y, 24, 20, '#5a4a3a'); // frame
  px(x + 1, y + 1, 22, 18, '#000');
  // Sky fill
  const sky = getSkyColor();
  px(x + 2, y + 2, 20, 16, sky.bot);
  px(x + 2, y + 2, 20, 8, sky.top);
  // Window cross
  px(x + 11, y + 1, 2, 18, '#5a4a3a');
  px(x + 1, y + 9, 22, 2, '#5a4a3a');
  // Stars at night
  if (light < 0.3) {
    const stars = [[x+5, y+4], [x+15, y+6], [x+8, y+13], [x+18, y+3]];
    stars.forEach(s => px(s[0], s[1], 1, 1, '#ffffff'));
  }
  // Sunlight glow
  if (light > 0.7) {
    ctx.fillStyle = 'rgba(255,255,200,0.08)';
    ctx.fillRect((x - 2) * PX, (y + 20) * PX, 28 * PX, 40 * PX);
  }
}

function drawDoor(x, y, light) {
  px(x, y, 14, 28, lerpColor('#6a4020', '#3a2010', 1 - light));
  px(x + 1, y + 1, 12, 26, lerpColor('#8a6030', '#4a3018', 1 - light));
  px(x + 10, y + 14, 2, 2, '#c0a040'); // handle
}

function drawWhiteboard(x, y, light) {
  px(x, y, 30, 18, '#c0c0c0');
  px(x + 1, y + 1, 28, 16, '#f0f0f0');
  // Scribbles
  px(x + 3, y + 4, 8, 1, '#3060c0');
  px(x + 3, y + 7, 12, 1, '#c03030');

function drawClock(x, y) {
  const { h, m } = getTimeInfo();
  px(x, y, 10, 10, '#d0d0d0');
  px(x + 1, y + 1, 8, 8, '#f8f8f8');
  // Center dot
  px(x + 4, y + 4, 2, 2, '#000');
  // Hour hand (simplified)
  const ha = ((h % 12) / 12) * Math.PI * 2 - Math.PI / 2;
  const hx = Math.round(Math.cos(ha) * 2);
  const hy = Math.round(Math.sin(ha) * 2);
  px(x + 5 + hx, y + 5 + hy, 1, 1, '#000');
  // Minute hand
  const ma = (m / 60) * Math.PI * 2 - Math.PI / 2;
  const mx = Math.round(Math.cos(ma) * 3);
  const my = Math.round(Math.sin(ma) * 3);
  px(x + 5 + mx, y + 5 + my, 1, 1, '#c03030');
}

// DRAW AGENT (Pixel Art Character)
// ============================================================
function drawAgent(agent) {
  const x = Math.round(agent.x);
  const y = agent.y;
  const dir = agent.direction;
  const frame = agent.animFrame;
  const isWalking = agent.state === 'walking';
  const isSitting = agent.state === 'working' || agent.state === 'sitting';
  const isMage = agent.specialSprite === 'mage';

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse((x + 4) * PX, (y + 1) * PX, 5 * PX, 1.5 * PX, 0, 0, Math.PI * 2);
  ctx.fill();

  const bodyY = isSitting ? y - 14 : y - 20;
  const legOffset = isWalking ? Math.sin(frame * Math.PI / 2) * 2 : 0;

  if (agent.status === 'offline') {
    ctx.globalAlpha = 0.4;
  }

  // Legs
  if (!isSitting) {
    px(x + 2, bodyY + 14, 2, 4 + (isWalking ? legOffset : 0), agent.pantsColor);
    px(x + 5, bodyY + 14, 2, 4 - (isWalking ? legOffset : 0), agent.pantsColor);
    // Shoes
    px(x + 1, bodyY + 18 + (isWalking ? legOffset : 0), 3, 2, '#2a2020');
    px(x + 5, bodyY + 18 - (isWalking ? legOffset : 0), 3, 2, '#2a2020');
  } else {
    // Sitting legs (bent)
    px(x + 1, bodyY + 14, 3, 2, agent.pantsColor);
    px(x + 5, bodyY + 14, 3, 2, agent.pantsColor);
    px(x + 0, bodyY + 16, 3, 2, agent.pantsColor);
    px(x + 6, bodyY + 16, 3, 2, agent.pantsColor);
  }

  // Body/Shirt
  if (isMage) {
    // Robe
    px(x + 1, bodyY + 6, 7, 8, agent.shirtColor);
    px(x + 0, bodyY + 10, 9, 4, agent.shirtColor);
    // Robe trim
    px(x + 1, bodyY + 13, 7, 1, '#f0c040');
  } else {
    px(x + 1, bodyY + 6, 7, 8, agent.shirtColor);
  }

  // Arms
  const armFrame = agent.state === 'working' ? Math.sin(Date.now() / 150) : 0;
  if (dir === 1) {
    px(x + 7, bodyY + 7, 2, 5 + (agent.state === 'working' ? armFrame : 0), agent.shirtColor);
    px(x, bodyY + 7, 2, 5, agent.shirtColor);
  } else {
    px(x, bodyY + 7, 2, 5 + (agent.state === 'working' ? armFrame : 0), agent.shirtColor);
    px(x + 7, bodyY + 7, 2, 5, agent.shirtColor);
  }

  // Hands
  px(x + (dir === 1 ? 7 : 0), bodyY + 12, 2, 1, agent.skinColor);
  px(x + (dir === 1 ? 0 : 7), bodyY + 12, 2, 1, agent.skinColor);

  // Head
  px(x + 1, bodyY, 7, 6, agent.skinColor);

  // Hair
  if (isMage) {
    // Wizard hat
    px(x, bodyY - 1, 9, 2, agent.shirtColor);
    px(x + 1, bodyY - 3, 7, 2, agent.shirtColor);
    px(x + 2, bodyY - 5, 5, 2, agent.shirtColor);
    px(x + 3, bodyY - 6, 3, 1, agent.shirtColor);
    px(x + 4, bodyY - 7, 1, 1, '#f0c040'); // star on hat
  } else {
    px(x + 1, bodyY - 1, 7, 2, agent.hairColor);
    if (dir === 1) {
      px(x + 7, bodyY, 1, 3, agent.hairColor);
    } else {
      px(x + 1, bodyY, 1, 3, agent.hairColor);
    }
  }

  // Face
  // Eyes
  if (dir === 1) {
    px(x + 4, bodyY + 2, 1, 1, '#000');
    px(x + 6, bodyY + 2, 1, 1, '#000');
  } else {
    px(x + 2, bodyY + 2, 1, 1, '#000');
    px(x + 4, bodyY + 2, 1, 1, '#000');
  }
  // Mouth (small smile)
  px(x + 4, bodyY + 4, 2, 1, '#c08060');

  // Coffee cup
  if (agent.hasCoffee) {
    const cupX = dir === 1 ? x + 8 : x - 3;
    px(cupX, bodyY + 10, 3, 3, '#f0f0f0');
    px(cupX + 1, bodyY + 9, 1, 1, '#a08060');
    // Tiny steam
    if (Math.random() > 0.5) {
      ctx.fillStyle = 'rgba(200,200,220,0.5)';
      ctx.fillRect((cupX + 1) * PX, (bodyY + 8) * PX, PX, PX);
    }
  }

  ctx.globalAlpha = 1;

  // Name tag
  const nameY = isSitting ? bodyY - 10 : bodyY - 10;
  pxTextCenter(agent.name, x + 4, nameY, '#fff', 3);

  // Status indicator
  const statusColors = { working: '#40ff40', idle: '#ffff40', offline: '#ff4040' };
  const statusEmoji = { working: '🟢', idle: '🟡', offline: '🔴' };
  ctx.fillStyle = statusColors[agent.status] || '#808080';
  ctx.beginPath();
  ctx.arc((x + 4) * PX, (nameY - 3) * PX, 2 * PX, 0, Math.PI * 2);
  ctx.fill();

  // Speech bubble
  if (agent.speechBubble) {
    drawSpeechBubble(x + 4, nameY - 10, agent.speechBubble);
  }

  // Task indicator when working
  if (agent.state === 'working' && agent.task && !agent.speechBubble) {
    drawSpeechBubble(x + 4, nameY - 10, agent.task.substring(0, 20) + (agent.task.length > 20 ? '...' : ''));
  }
}

function drawSpeechBubble(x, y, text) {
  ctx.font = `${3 * PX}px 'Press Start 2P', monospace`;
  const m = ctx.measureText(text);
  const bw = m.width / PX + 8;
  const bh = 8;
  const bx = x - bw / 2;
  const by = y - bh;

  // Bubble background
  ctx.fillStyle = '#fff';
  ctx.fillRect(bx * PX, by * PX, bw * PX, bh * PX);
  // Border
  ctx.strokeStyle = '#000';
  ctx.lineWidth = PX;
  ctx.strokeRect(bx * PX, by * PX, bw * PX, bh * PX);
  // Tail
  ctx.fillStyle = '#fff';
  ctx.fillRect((x - 1) * PX, (by + bh) * PX, 3 * PX, 2 * PX);
  ctx.fillStyle = '#000';
  ctx.fillRect((x - 2) * PX, (by + bh) * PX, 1 * PX, 2 * PX);
  ctx.fillRect((x + 2) * PX, (by + bh) * PX, 1 * PX, 2 * PX);
  ctx.fillRect((x - 1) * PX, (by + bh + 2) * PX, 1 * PX, 1 * PX);
  ctx.fillRect((x + 1) * PX, (by + bh + 2) * PX, 1 * PX, 1 * PX);

  // Text
  ctx.fillStyle = '#000';
  ctx.font = `${3 * PX}px 'Press Start 2P', monospace`;
  ctx.fillText(text, (bx + 4) * PX, (by + 5.5) * PX);
}

// ============================================================
// DRAW LARGER AGENT PORTRAIT (for side panel)
// ============================================================
function drawAgentPortrait(agent, targetCanvas) {
  const pctx = targetCanvas.getContext('2d');
  const S = 6; // scale
  targetCanvas.width = 12 * S;
  targetCanvas.height = 24 * S;
  pctx.imageSmoothingEnabled = false;

  function p(x, y, w, h, c) {
    pctx.fillStyle = c;
    pctx.fillRect(x * S, y * S, w * S, h * S);
  }

  const isMage = agent.specialSprite === 'mage';

  // Legs
  p(2, 16, 3, 6, agent.pantsColor);
  p(7, 16, 3, 6, agent.pantsColor);
  // Shoes
  p(1, 22, 4, 2, '#2a2020');
  p(7, 22, 4, 2, '#2a2020');

  // Body
  if (isMage) {
    p(1, 8, 10, 8, agent.shirtColor);
    p(0, 13, 12, 4, agent.shirtColor);
    p(1, 16, 10, 1, '#f0c040');
  } else {
    p(1, 8, 10, 8, agent.shirtColor);
  }

  // Arms
  p(0, 9, 2, 6, agent.shirtColor);
  p(10, 9, 2, 6, agent.shirtColor);
  p(0, 15, 2, 1, agent.skinColor);
  p(10, 15, 2, 1, agent.skinColor);

  // Head
  p(1, 1, 10, 7, agent.skinColor);

  // Hair
  if (isMage) {
    p(0, 0, 12, 2, agent.shirtColor);
    p(1, -2, 10, 2, agent.shirtColor);
    p(2, -4, 8, 2, agent.shirtColor);
    p(3, -6, 6, 2, agent.shirtColor);
    p(4, -7, 4, 1, agent.shirtColor);
    p(5, -8, 2, 1, '#f0c040');
  } else {
    p(1, 0, 10, 2, agent.hairColor);
    p(9, 1, 2, 3, agent.hairColor);
  }

  // Eyes
  p(4, 3, 2, 2, '#000');
  p(8, 3, 2, 2, '#000');
  p(5, 4, 1, 1, '#fff');
  p(9, 4, 1, 1, '#fff');

  // Mouth
  p(5, 6, 3, 1, '#c08060');
}

// CLICK DETECTION
// ============================================================
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / (rect.width / (OFFICE_W * PX)) / PX;
  const my = (e.clientY - rect.top) / (rect.height / (OFFICE_H * PX)) / PX;

  // Check if click is on an agent
  for (let i = agents.length - 1; i >= 0; i--) {
    const a = agents[i];
    const ax = a.x;
    const ay = a.state === 'working' || a.state === 'sitting' ? a.y - 14 : a.y - 20;
    if (mx >= ax - 2 && mx <= ax + 12 && my >= ay && my <= a.y + 2) {
      openAgentPanel(a);
      return;
    }
  }
});

let selectedAgent = null;

function openAgentPanel(agent) {
  selectedAgent = agent;
  const panel = document.getElementById('sidePanel');
  panel.classList.add('open');
  updatePanelContent();
}

function closePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  selectedAgent = null;
}

function updatePanelContent() {
  if (!selectedAgent) return;
  const a = selectedAgent;
  const c = document.getElementById('panelContent');

  c.innerHTML = `
    <div class="agent-avatar"><canvas id="portraitCanvas"></canvas></div>
    <h2>${a.name}</h2>
    <p style="font-size:7px;color:#a0a0c0;margin-bottom:8px">${a.role}</p>
    <span class="status-badge ${a.status}">${a.status.toUpperCase()}</span>
    ${a.task ? `<p style="font-size:7px;color:#c0c0e0;margin:8px 0">📋 ${a.task}</p>` : ''}

    <div class="btn-row">
      <button class="pixel-btn success" onclick="panelAssignTask()">📝 Assign Task</button>
      <button class="pixel-btn" onclick="panelMakeIdle()">☕ Make Idle</button>
    </div>
    <div class="btn-row">
      <button class="pixel-btn" onclick="panelSendMessage()">💬 Send Message</button>
      <button class="pixel-btn danger" onclick="panelToggleOffline()">
        ${a.status === 'offline' ? '🟢 Online' : '🔴 Offline'}
      </button>
    </div>

    <h3>📝 Set Task</h3>
    <div class="panel-field">
      <input type="text" id="taskInput" placeholder="Enter task..." value="${a.task}" />
    </div>
    <button class="pixel-btn success" onclick="panelSubmitTask()" style="width:100%;margin-bottom:12px">Start Task</button>

    <h3>💬 Send Message</h3>
    <div class="panel-field">
      <input type="text" id="msgInput" placeholder="Say something..." />
    </div>
    <button class="pixel-btn" onclick="panelSubmitMessage()" style="width:100%;margin-bottom:12px">Send</button>

    <h3>📊 Activity Log</h3>
    <div class="activity-log">
      ${a.activityLog.map(l => `
        <div class="log-entry"><span class="time">[${l.time}]</span> ${l.msg}</div>
      `).join('')}
    </div>
  `;

  // Draw portrait
  const portraitCanvas = document.getElementById('portraitCanvas');
  if (portraitCanvas) drawAgentPortrait(a, portraitCanvas);
}

function panelAssignTask() {
  const input = document.getElementById('taskInput');
  if (input && input.value.trim()) {
    selectedAgent.assignTask(input.value.trim());
    updatePanelContent();
  }
}

function panelMakeIdle() {
  if (selectedAgent) {
    selectedAgent.makeIdle();
    updatePanelContent();
  }
}

function panelSendMessage() {
  const input = document.getElementById('msgInput');
  if (input && input.value.trim()) {
    selectedAgent.say(input.value.trim(), 5);
    selectedAgent.log(`Said: "${input.value.trim()}"`);
    input.value = '';
    updatePanelContent();
  }
}

function panelSubmitTask() { panelAssignTask(); }
function panelSubmitMessage() { panelSendMessage(); }

function panelToggleOffline() {
  if (!selectedAgent) return;
  if (selectedAgent.status === 'offline') {
    selectedAgent.status = 'idle';
    selectedAgent.state = 'idle';
    selectedAgent.log('Came back online');
    selectedAgent.say('I\'m back! 👋', 3);
  } else {
    selectedAgent.makeOffline();
  }
  updatePanelContent();
}

function addAgent() {
  const name = document.getElementById('newAgentName').value.trim();
  const role = document.getElementById('newAgentRole').value.trim();
  const selected = document.querySelector('.color-swatch.selected');
  if (!name) { showToast('❌ Enter a name!'); return; }
  const color = selected ? selected.dataset.color : '#808080';
  const hairColors = ['#402010', '#804020', '#202020', '#c0a040', '#603010', '#901010'];
  const hair = hairColors[Math.floor(Math.random() * hairColors.length)];
  const agent = new Agent(name, color, hair, role || 'Agent');
  agents.push(agent);
  document.querySelector('.modal-overlay').remove();
  showToast(`✅ ${name} joined the office!`);
  updateAgentCount();

        <input type="text" id="broadcastMsg" placeholder="Hey everyone..." />
      </div>
      <div class="btn-row">
        <button class="pixel-btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="pixel-btn success" onclick="broadcast()">Send</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

function broadcast() {
  const msg = document.getElementById('broadcastMsg').value.trim();
  if (!msg) return;
  agents.forEach(a => {
    if (a.status !== 'offline') {
      setTimeout(() => {
        a.say(msg, 4);
        a.log(`Broadcast: "${msg}"`);
      }, Math.random() * 1000);
    }
  });
  document.querySelector('.modal-overlay').remove();
  showToast('📢 Broadcast sent!');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function updateAgentCount() {
  document.getElementById('agentCount').textContent = `${agents.length} agents`;
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
let lastTime = 0;
let frameCount = 0;
let fpsTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime = timestamp;

  // FPS counter
  frameCount++;
  fpsTime += dt;
  if (fpsTime >= 1) {
    document.getElementById('fpsDisplay').textContent = `${frameCount} FPS`;
    frameCount = 0;
    fpsTime = 0;
  }

  // Update clock display
  const ti = getTimeInfo();
  document.getElementById('clockDisplay').textContent =
    `${String(ti.h).padStart(2,'0')}:${String(ti.m).padStart(2,'0')}:${String(ti.s).padStart(2,'0')}`;
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('dateDisplay').textContent =
    `${days[ti.now.getDay()]} ${months[ti.now.getMonth()]} ${ti.now.getDate()}`;

  // Random events
  nextEventTime -= dt;
  if (nextEventTime <= 0) {
    triggerRandomEvent();
    nextEventTime = 20 + Math.random() * 40;
  }

  // Update agents
  agents.forEach(a => a.update(dt));

  // Clear
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw office background
  drawOffice();

  // Draw agents (sorted by Y for depth)
  const sorted = [...agents].sort((a, b) => a.y - b.y);
  sorted.forEach(a => drawAgent(a));

  // Update panel if open
  if (selectedAgent && document.getElementById('sidePanel').classList.contains('open')) {
    // Only update log and status periodically to avoid input focus issues
    const badge = document.querySelector('.status-badge');
    if (badge) {
      badge.className = `status-badge ${selectedAgent.status}`;
      badge.textContent = selectedAgent.status.toUpperCase();
    }
  }

  requestAnimationFrame(gameLoop);
}

// Enter key handlers
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closePanel();
  if (e.key === 'Enter') {
    if (document.getElementById('taskInput') === document.activeElement) panelSubmitTask();
    if (document.getElementById('msgInput') === document.activeElement) panelSubmitMessage();
    if (document.getElementById('broadcastMsg') === document.activeElement) broadcast();
    if (document.getElementById('newAgentName') === document.activeElement ||
        document.getElementById('newAgentRole') === document.activeElement) addAgent();
  }
});

// Start!
updateAgentCount();
requestAnimationFrame(gameLoop);

console.log('%c🏢 Aleksa\'s AI Office loaded!', 'font-size:16px;color:#f0c040;font-family:monospace');
console.log('%cClick on agents to interact with them.', 'font-size:12px;color:#a0a0c0');
</script>
</body>
</html>
