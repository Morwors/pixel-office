<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#16161a">
<title>Aleksa's AI Office</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{--bg:#16161a;--sf:#242629;--sf2:#2e3035;--brd:#3a3d44;--tx:#fffffe;--dim:#94a1b2;--dim2:#72778a;--acc:#7f5af0;--acc2:#2cb67d;--warn:#ff8906;--err:#e53170;--bar:40px;--font:'Press Start 2P',monospace;--safe-b:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#000;font-family:var(--font);color:var(--tx);overflow:hidden;height:100dvh;width:100vw;user-select:none;-webkit-user-select:none;touch-action:manipulation;position:fixed}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;cursor:pointer;touch-action:none}
#topBar{position:fixed;top:0;left:0;right:0;height:var(--bar);background:rgba(22,22,26,.85);backdrop-filter:blur(8px);border-bottom:1px solid rgba(58,61,68,.5);display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:100}
#topBar .logo{color:var(--acc);font-size:clamp(7px,2vw,10px);display:flex;align-items:center;gap:6px}
#topBar .logo span{color:var(--dim)}
#topBar .info{color:var(--dim2);font-size:clamp(6px,1.4vw,8px);display:flex;gap:10px;align-items:center}
#bottomNav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--bar) + var(--safe-b));padding-bottom:var(--safe-b);background:rgba(22,22,26,.88);backdrop-filter:blur(8px);border-top:1px solid rgba(58,61,68,.5);display:flex;align-items:center;justify-content:space-around;z-index:100}
.nav-btn{font-family:var(--font);font-size:clamp(5px,1.3vw,7px);color:var(--dim);background:none;border:none;cursor:pointer;padding:6px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s}
.nav-btn:active,.nav-btn.active{color:var(--acc)}
.nav-btn .ico{font-size:15px}
#statusBar{position:fixed;bottom:calc(var(--bar) + var(--safe-b) + 6px);left:50%;transform:translateX(-50%);display:flex;gap:3px;background:rgba(22,22,26,.88);border:1px solid rgba(58,61,68,.5);border-radius:20px;padding:4px 10px;z-index:90;max-width:95vw;overflow-x:auto;scrollbar-width:none}
#statusBar::-webkit-scrollbar{display:none}
.sdot{display:flex;align-items:center;gap:3px;font-size:clamp(5px,1.1vw,6px);color:var(--dim);white-space:nowrap;padding:3px 6px;cursor:pointer;border-radius:10px;transition:background .15s}
.sdot:active{background:var(--sf2)}
.sdot .d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.d-w{background:var(--acc2);box-shadow:0 0 6px var(--acc2)}
.d-i{background:var(--warn);box-shadow:0 0 4px rgba(255,137,6,.5)}
.d-o{background:#555}
#sheet{position:fixed;left:0;right:0;bottom:calc(var(--bar) + var(--safe-b));max-height:72dvh;background:var(--sf);border-top:1px solid var(--brd);border-radius:16px 16px 0 0;z-index:150;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow:hidden;display:flex;flex-direction:column}
#sheet.open{transform:translateY(0)}
#sheetGrab{width:100%;padding:10px;display:flex;justify-content:center;cursor:grab;flex-shrink:0}
#sheetGrab::after{content:'';width:32px;height:4px;background:var(--brd);border-radius:2px}
#sheetBody{padding:0 16px 20px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.agent-card{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.agent-card .av{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.agent-card .info h2{font-size:clamp(8px,2.2vw,11px);margin-bottom:3px}
.agent-card .info .role{font-size:clamp(5px,1.3vw,7px);color:var(--dim)}
.pill{display:inline-block;padding:3px 10px;font-size:clamp(5px,1.2vw,7px);font-family:var(--font);border-radius:10px;margin:6px 0 10px}
.pill-w{background:rgba(44,182,125,.15);color:var(--acc2);border:1px solid rgba(44,182,125,.3)}
.pill-i{background:rgba(255,137,6,.12);color:var(--warn);border:1px solid rgba(255,137,6,.25)}
.pill-o{background:rgba(255,255,255,.05);color:var(--dim2);border:1px solid var(--brd)}
.task-box{font-size:clamp(6px,1.4vw,7px);color:var(--dim);padding:8px 10px;background:var(--sf2);border-radius:8px;margin-bottom:10px;border-left:3px solid var(--acc2)}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.pbtn{font-family:var(--font);font-size:clamp(6px,1.5vw,8px);padding:10px;background:var(--sf2);color:var(--tx);border:1px solid var(--brd);cursor:pointer;border-radius:8px;text-align:center;transition:background .15s,transform .1s}
.pbtn:active{transform:scale(.96);background:var(--brd)}
.pbtn.green{background:rgba(44,182,125,.15);border-color:rgba(44,182,125,.3);color:var(--acc2)}
.pbtn.red{background:rgba(229,49,112,.12);border-color:rgba(229,49,112,.25);color:var(--err)}
.pbtn.full{grid-column:1/-1}
.sfield{margin-bottom:8px}
.sfield label{font-size:clamp(5px,1.1vw,6px);color:var(--dim2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.sfield input{width:100%;padding:10px 12px;font-family:var(--font);font-size:clamp(7px,1.6vw,9px);background:var(--bg);color:var(--tx);border:1px solid var(--brd);border-radius:8px;outline:none;transition:border-color .2s}
.sfield input:focus{border-color:var(--acc)}
.log-section{margin-top:8px}
.log-section h3{font-size:clamp(5px,1.2vw,7px);color:var(--dim2);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.alog{max-height:120px;overflow-y:auto}
.le{font-size:clamp(5px,1.1vw,6px);color:var(--dim);padding:4px 0;border-bottom:1px solid rgba(58,61,68,.4);line-height:1.7}
.le .t{color:var(--dim2)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;animation:fi .2s ease}
@keyframes fi{from{opacity:0}}
.modal{background:var(--sf);border:1px solid var(--brd);border-radius:12px;padding:20px;width:100%;max-width:360px;animation:su .25s ease}
@keyframes su{from{transform:translateY(16px);opacity:0}}
.modal h2{font-size:clamp(8px,2vw,11px);color:var(--acc);margin-bottom:16px}
.modal .btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.color-row{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.csw{width:30px;height:30px;border:2px solid var(--brd);border-radius:6px;cursor:pointer;transition:transform .1s}
.csw.sel{border-color:var(--acc);box-shadow:0 0 10px rgba(127,90,240,.4);transform:scale(1.12)}
.toast{position:fixed;top:calc(var(--bar)+10px);left:50%;transform:translateX(-50%);background:var(--sf2);border:1px solid var(--brd);padding:8px 16px;font-size:clamp(6px,1.4vw,8px);font-family:var(--font);color:var(--tx);z-index:300;border-radius:8px;animation:fi .3s ease,fo .3s ease 2.7s forwards;pointer-events:none;white-space:nowrap}
@keyframes fo{to{opacity:0;transform:translateX(-50%) translateY(-8px)}}
.notif{position:fixed;top:calc(var(--bar)+10px);right:12px;background:var(--acc2);color:#000;font-family:var(--font);font-size:6px;padding:6px 10px;border-radius:8px;z-index:90;animation:fi .3s ease,fo .3s ease 3.7s forwards;pointer-events:none}
#loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .5s}
#loading.hide{opacity:0;pointer-events:none}
#loading h1{font-size:clamp(10px,3vw,16px);color:var(--acc)}
#loading p{font-size:clamp(6px,1.5vw,8px);color:var(--dim)}
.ldots span{display:inline-block;width:8px;height:8px;background:var(--acc);margin:0 4px;border-radius:2px;animation:lb 1s infinite ease-in-out}
.ldots span:nth-child(2){animation-delay:.15s}
.ldots span:nth-child(3){animation-delay:.3s}
@keyframes lb{0%,80%,100%{transform:scaleY(.4)}40%{transform:scaleY(1)}}
#feedPanel{position:fixed;left:0;right:0;bottom:calc(var(--bar)+var(--safe-b));max-height:60dvh;background:var(--sf);border-top:1px solid var(--brd);border-radius:16px 16px 0 0;z-index:150;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow:hidden;display:flex;flex-direction:column}
#feedPanel.open{transform:translateY(0)}
#feedPanel .grab{width:100%;padding:10px;display:flex;justify-content:center;flex-shrink:0}
#feedPanel .grab::after{content:'';width:32px;height:4px;background:var(--brd);border-radius:2px}
#feedBody{padding:0 16px 16px;overflow-y:auto;flex:1}
#feedBody h2{font-size:clamp(7px,1.8vw,9px);color:var(--acc);margin-bottom:10px}
.feed-item{font-size:clamp(5px,1.2vw,7px);color:var(--dim);padding:6px 0;border-bottom:1px solid rgba(58,61,68,.3);display:flex;gap:8px}
.feed-item .fi-time{color:var(--dim2);flex-shrink:0;min-width:36px}
@media(min-width:769px){#sheet{max-width:380px;right:8px;left:auto}#feedPanel{max-width:340px;left:8px;right:auto}}
</style>
</head>
<body>
<div id="loading"><h1>🏢 AI Office</h1><p>Loading workspace...</p><div class="ldots"><span></span><span></span><span></span></div></div>
<div id="topBar"><div class="logo">🏢 <span>Aleksa's AI Office</span></div><div class="info"><span id="clock">--:--</span><span id="date"></span></div></div>
<canvas id="c"></canvas>
<div id="statusBar"></div>
<div id="sheet"><div id="sheetGrab"></div><div id="sheetBody"></div></div>
<div id="feedPanel"><div class="grab"></div><div id="feedBody"></div></div>
<div id="bottomNav">
  <button class="nav-btn active" onclick="navTo('home')"><span class="ico">🏠</span><span>Home</span></button>
  <button class="nav-btn" onclick="navTo('agents')"><span class="ico">👥</span><span>Agents</span></button>
  <button class="nav-btn" onclick="navTo('events')"><span class="ico">⚡</span><span>Events</span></button>
  <button class="nav-btn" onclick="navTo('add')"><span class="ico">➕</span><span>Add</span></button>
</div>
<script>
// ═══════════════════════════════════════════════
// PIXEL OFFICE — Complete Rewrite v4
// ═══════════════════════════════════════════════
const cv=document.getElementById('c'),ctx=cv.getContext('2d');

// World is 480x270 virtual pixels, scaled to fill screen
const VW=480,VH=270;

// Pre-render static floor texture once
let floorImg=null;

function initFloor(){
  const fc=document.createElement('canvas');
  fc.width=VW;fc.height=VH;
  const fx=fc.getContext('2d');
  // Floor area from y=135 to 270
  const fy0=135;
  // Wood plank floor
  for(let py=fy0;py<VH;py++){
    for(let px=0;px<VW;px++){
      const plank=Math.floor(px/24);
      const row=Math.floor((py-fy0)/8);
      const offset=(row%2)*12;
      const plankInRow=Math.floor((px+offset)/24);
      const isGap=((px+offset)%24===0)||((py-fy0)%8===0);
      if(isGap){
        fx.fillStyle='#5a4a35';
      } else {
        // Alternate plank shades
        const seed=(plankInRow*7+row*13)%5;
        const bases=['#b89468','#c4a070','#a88858','#bfa06a','#c8a878'];
        const base=bases[seed];
        // Subtle grain noise
        const noise=((px*13+py*7)%11-5)*2;
        const r=parseInt(base.slice(1,3),16)+noise;
        const g=parseInt(base.slice(3,5),16)+noise;
        const b=parseInt(base.slice(5,7),16)+noise;
        fx.fillStyle=`rgb(${Math.max(0,Math.min(255,r))},${Math.max(0,Math.min(255,g))},${Math.max(0,Math.min(255,b))})`;
      }
      fx.fillRect(px,py,1,1);
    }
  }
  floorImg=fc;
}

function resize(){
  const w=window.innerWidth,h=window.innerHeight;
  // Fill screen completely
  const scaleX=w/VW,scaleY=h/VH;
  const s=Math.max(scaleX,scaleY);
  cv.width=VW;cv.height=VH;
  cv.style.width=Math.ceil(VW*s)+'px';
  cv.style.height=Math.ceil(VH*s)+'px';
  cv.style.left=Math.floor((w-VW*s)/2)+'px';
  cv.style.top=Math.floor((h-VH*s)/2)+'px';
}
window.addEventListener('resize',resize);

// ─── Pixel helper ───
function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h)}

// ─── Time ───
function getTime(){const n=new Date();return{h:n.getHours(),m:n.getMinutes(),s:n.getSeconds(),d:n}}
function daylight(){const h=getTime().h;if(h>=7&&h<17)return 1;if(h>=6&&h<7)return h-6;if(h>=17&&h<19)return 1-(h-17)/2;return .2}

function tint(hex,L){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgb(${r*L|0},${g*L|0},${b*L|0})`
}

// ═══════════════════════════════════════════════
// OFFICE LAYOUT CONSTANTS
// ═══════════════════════════════════════════════
const WALL_TOP=20;    // where wall starts
const WALL_BOT=135;   // where floor starts
const WALK_Y=210;     // agent walk line (middle of floor)

// ═══════════════════════════════════════════════
// DRAW OFFICE (called every frame)
// ═══════════════════════════════════════════════
function drawOffice(){
  const L=daylight();

  // ─── SKY (visible through windows) ───
  const skyHi=L>.5?'#4a80c8':'#0e0e20';
  const skyLo=L>.5?'#88c0e8':'#1a1a30';

  // ─── CEILING ───
  px(0,0,VW,WALL_TOP,tint('#e0dcd4',L));
  // Ceiling trim
  px(0,WALL_TOP-2,VW,2,tint('#c8c0b0',L));
  // Ceiling lights
  for(let lx=40;lx<VW;lx+=100){
    px(lx,WALL_TOP-6,40,4,tint('#f8f4e8',L));
    px(lx+2,WALL_TOP-8,36,3,tint('#fffef0',L));
    // Warm glow
    if(L>.3){
      ctx.fillStyle=`rgba(255,245,210,${.08*L})`;
      ctx.fillRect(lx-5,WALL_TOP,50,WALL_BOT-WALL_TOP);
    }
  }

  // ─── WALL ───
  // Main wall color
  px(0,WALL_TOP,VW,WALL_BOT-WALL_TOP,tint('#d8d0c0',L));
  // Wainscoting (lower wall panel)
  px(0,WALL_BOT-30,VW,30,tint('#c8c0a8',L));
  px(0,WALL_BOT-30,VW,1,tint('#b8b098',L));
  // Baseboard
  px(0,WALL_BOT-2,VW,2,tint('#8a7a58',L));

  // ─── WINDOWS ───
  const windows=[60,160,300,400];
  windows.forEach(wx=>{
    const ww=50,wh=60;
    const wy=WALL_TOP+12;
    // Frame
    px(wx-2,wy-2,ww+4,wh+4,tint('#706040',L));
    px(wx-1,wy-1,ww+2,wh+2,tint('#887860',L));
    // Glass - sky gradient
    for(let i=0;i<wh;i++){
      const t=i/wh;
      const r1=parseInt(skyHi.slice(1,3),16),g1=parseInt(skyHi.slice(3,5),16),b1=parseInt(skyHi.slice(5,7),16);
      const r2=parseInt(skyLo.slice(1,3),16),g2=parseInt(skyLo.slice(3,5),16),b2=parseInt(skyLo.slice(5,7),16);
      ctx.fillStyle=`rgb(${r1+(r2-r1)*t|0},${g1+(g2-g1)*t|0},${b1+(b2-b1)*t|0})`;
      ctx.fillRect(wx,wy+i,ww,1);
    }
    // Mullions (cross bars)
    px(wx+ww/2-1,wy,2,wh,tint('#887860',L));
    px(wx,wy+wh/2-1,ww,2,tint('#887860',L));
    // Sill
    px(wx-3,wy+wh+1,ww+6,3,tint('#a09070',L));
    // Night stars
    if(L<.3){
      px(wx+8,wy+10,1,1,'#fff');px(wx+30,wy+6,1,1,'#fff');
      px(wx+18,wy+20,1,1,'#ddd');px(wx+40,wy+15,1,1,'#eee');
    }
    // Sun rays
    if(L>.6){
      ctx.fillStyle=`rgba(255,250,220,${.025*L})`;
      ctx.beginPath();
      ctx.moveTo(wx,wy+wh);ctx.lineTo(wx-15,WALL_BOT+60);ctx.lineTo(wx+ww+15,WALL_BOT+60);ctx.lineTo(wx+ww,wy+wh);
      ctx.fill();
    }
  });

  // ─── WALL DECORATIONS ───
  // Whiteboard
  px(125,WALL_TOP+8,45,35,tint('#c8c8c8',L));
  px(126,WALL_TOP+9,43,33,tint('#f4f4f4',L));
  px(129,WALL_TOP+14,15,1,tint('#4060c0',L));
  px(129,WALL_TOP+18,22,1,tint('#c04040',L));
  px(129,WALL_TOP+22,10,1,tint('#40a040',L));
  px(129,WALL_TOP+26,18,1,tint('#c0a020',L));
  // Sticky notes on whiteboard
  px(148,WALL_TOP+12,8,6,tint('#fff480',L));
  px(158,WALL_TOP+14,8,6,tint('#80d0ff',L));

  // Wall clock
  px(260,WALL_TOP+10,14,14,tint('#e0e0e0',L));
  px(261,WALL_TOP+11,12,12,tint('#f8f8f8',L));
  const t=getTime();
  px(266,WALL_TOP+16,2,2,tint('#333333',L));
  // Hour hand
  const ha=((t.h%12)/12)*Math.PI*2-Math.PI/2;
  px(267+Math.cos(ha)*3|0,WALL_TOP+17+Math.sin(ha)*3|0,1,1,tint('#333',L));

  // Framed art
  px(350,WALL_TOP+10,30,22,tint('#3a3020',L));
  px(351,WALL_TOP+11,28,20,tint('#1a2a40',L));
  // Abstract landscape
  px(353,WALL_TOP+22,24,7,tint('#2a6030',L));
  px(353,WALL_TOP+13,24,9,tint('#4080c0',L));
  px(360,WALL_TOP+18,6,11,tint('#206020',L));
  px(370,WALL_TOP+20,4,9,tint('#206020',L));

  // ─── FLOOR (pre-rendered) ───
  if(floorImg){
    if(L>=.95){
      ctx.drawImage(floorImg,0,0);
    } else {
      ctx.drawImage(floorImg,0,0);
      ctx.fillStyle=`rgba(0,0,0,${1-L})`;
      ctx.fillRect(0,WALL_BOT,VW,VH-WALL_BOT);
    }
  }
  // Floor shadow at wall base
  ctx.fillStyle='rgba(0,0,0,.15)';
  ctx.fillRect(0,WALL_BOT,VW,4);

  // ─── DOOR (left wall) ───
  px(8,WALL_TOP+35,18,WALL_BOT-WALL_TOP-35,tint('#7a5030',L));
  px(9,WALL_TOP+36,16,WALL_BOT-WALL_TOP-37,tint('#9a6840',L));
  px(22,WALL_TOP+65,3,3,tint('#d0a040',L));
  // Welcome mat
  px(8,WALL_BOT+1,20,4,tint('#408040',L));

  // ─── DESKS (4 desk areas across the floor) ───
  drawDesk(50,WALL_BOT+10);
  drawDesk(140,WALL_BOT+10);
  drawDesk(250,WALL_BOT+10);
  drawDesk(380,WALL_BOT+10);

  // ─── MEETING AREA (right side, near wall) ───
  // Conference table
  px(420,WALL_BOT+6,50,24,tint('#706050',L));
  px(421,WALL_BOT+7,48,22,tint('#887460',L));
  // Chairs around table
  px(423,WALL_BOT+2,10,5,tint('#4a4a6a',L));
  px(438,WALL_BOT+2,10,5,tint('#4a4a6a',L));
  px(455,WALL_BOT+2,10,5,tint('#4a4a6a',L));
  px(423,WALL_BOT+29,10,5,tint('#4a4a6a',L));
  px(438,WALL_BOT+29,10,5,tint('#4a4a6a',L));
  px(455,WALL_BOT+29,10,5,tint('#4a4a6a',L));

  // ─── COFFEE STATION (left side floor) ───
  // Counter
  px(6,WALL_BOT+55,40,5,tint('#c8b898',L));
  px(6,WALL_BOT+60,40,12,tint('#a89070',L));
  // Coffee machine
  px(10,WALL_BOT+44,12,11,tint('#3a3a3a',L));
  px(11,WALL_BOT+45,10,6,tint('#2a2a2a',L));
  px(20,WALL_BOT+46,1,1,'#40ff40');
  // Mugs
  px(26,WALL_BOT+52,4,3,tint('#f0f0f0',L));
  px(32,WALL_BOT+52,4,3,tint('#e0d0c0',L));

  // ─── COUCH AREA (center-right floor) ───
  // Couch
  px(290,WALL_BOT+58,50,12,tint('#5a3020',L));
  px(292,WALL_BOT+60,22,8,tint('#7a4030',L));

const SHIRTS={purple:'#7f5af0',blue:'#3060c0',green:'#2cb67d',red:'#e53170',yellow:'#ff8906',orange:'#d06020',cyan:'#20a0b0',pink:'#c040a0'};

class Agent{
  constructor(n,sc,hc,role,spr){
    this.name=n;this.shirt=sc;this.hair=hc||'#402010';this.skin='#e8b880';this.pants='#3a3a4a';
    this.role=role||'Agent';this.spr=spr||null;
    this.x=60+Math.random()*380;this.y=WALK_Y+Math.random()*20-10;
    this.tx=this.x;this.ty=this.y;
    this.spd=.3+Math.random()*.15;this.dir=1;this.af=0;this.at=0;
    this.state='idle';this.status='idle';this.task='';
    this.bubble='';this.bt=0;this.hasCoffee=false;
    this.st=0;this.nb=3+Math.random()*8;this.log_=[];this._p=null;
    this.deskX=null;
    this.log('Arrived at the office');
  }
  log(m){const t=getTime();this.log_.unshift({time:`${String(t.h).padStart(2,'0')}:${String(t.m).padStart(2,'0')}`,msg:m});if(this.log_.length>30)this.log_.pop();addFeed(this.name,m)}
  say(t,d){this.bubble=t;this.bt=d||4}
  assignTask(t){
    this.task=t;this.status='working';this.state='walking';
    const dxs=[60,150,260,390];this.deskX=dxs[Math.floor(Math.random()*dxs.length)];
    this.tx=this.deskX+12;this.ty=WALK_Y-20+Math.random()*5;
    this.say('On it! 💻',3);this.log('Started: '+t);updStatus()
  }
  makeIdle(){this.status='idle';this.state='idle';this.task='';this.deskX=null;this.nb=2+Math.random()*5;this.st=0;this.say('Break time ☕',2);this.log('Now idle');updStatus()}
  makeOff(){this.status='offline';this.state='idle';this.task='';this.log('Went offline');updStatus()}
  update(dt){
    this.at+=dt;if(this.at>.18){this.af=(this.af+1)%4;this.at=0}
    if(this.bt>0){this.bt-=dt;if(this.bt<=0)this.bubble=''}
    this.st+=dt;
    if(this.status==='offline')return;
    if(this.state==='walking'){
      const dx=this.tx-this.x,dy=this.ty-this.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>1){
        this.dir=dx>0?1:-1;
        const s=this.spd*dt*60;
        this.x+=dx/dist*s;this.y+=dy/dist*s;
      } else {this.x=this.tx;this.y=this.ty;this.onArr()}
    }
    if(this.status==='idle'&&this.state!=='walking'){
      this.nb-=dt;if(this.nb<=0){this.pickIdle();this.nb=5+Math.random()*12}
    }
    if(this.status==='working'&&this.state==='working'&&this.st>25+Math.random()*35){
      this.say('Done! ✅',3);this.log('Completed: '+this.task);showNotif(this.name+' finished!');this.makeIdle()
    }
  }
  onArr(){
    if(this.status==='working'){this.state='working';this.st=0;return}
    if(this._p==='coffee'){this.state='idle';this.say('☕ Fresh brew!',3);this.log('Got coffee');this.hasCoffee=true;
      setTimeout(()=>{this.hasCoffee=false},8000)}
    else if(this._p==='couch'){this.state='sitting';this.say('😌',2);this.log('Relaxing')}
    else{this.state='idle'}
    this._p=null
  }
  pickIdle(){
    const b=['wander','wander','coffee','couch','wander','wander'][Math.random()*6|0];
    this._p=b;this.state='walking';
    if(b==='coffee'){this.tx=20;this.ty=WALK_Y+25}
    else if(b==='couch'){this.tx=300+Math.random()*30;this.ty=WALK_Y+28}
    else{this.tx=50+Math.random()*390;this.ty=WALK_Y+Math.random()*20-10}
  }
}

// DRAW AGENT — 12x20 sprite, more detailed
// ═══════════════════════════════════════════════
function drawAgent(a){
  const x=Math.round(a.x),y=Math.round(a.y);
  const isWalk=a.state==='walking';
  const isSit=a.state==='working'||a.state==='sitting';
  const isMage=a.spr==='mage';
  const L=daylight();
  const legOff=isWalk?Math.sin(a.af*Math.PI/2)*2:0;

  if(a.status==='offline')ctx.globalAlpha=.35;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.2)';
  ctx.beginPath();ctx.ellipse(x+6,y+1,6,2,0,0,Math.PI*2);ctx.fill();

  const by=isSit?y-10:y-18;

  // Legs
  if(!isSit){
    px(x+2,by+14,3,4+legOff,tint(a.pants,L));
    px(x+7,by+14,3,4-legOff,tint(a.pants,L));
    // Shoes
    px(x+1,by+18+legOff,4,2,tint('#2a2020',L));
    px(x+7,by+18-legOff,4,2,tint('#2a2020',L));
  } else {
    px(x+1,by+14,4,2,tint(a.pants,L));
    px(x+7,by+14,4,2,tint(a.pants,L));
  }

  // Body/torso
  if(isMage){
    px(x+1,by+6,10,8,tint(a.shirt,L));
    px(x,by+10,12,4,tint(a.shirt,L));
    px(x+1,by+13,10,1,tint('#f0c040',L)); // gold trim
  } else {
    px(x+1,by+6,10,8,tint(a.shirt,L));
    // Collar
    px(x+4,by+6,4,1,tint('#ffffff',L*.5+.5));
  }

  // Arms
  const armW=a.state==='working'?Math.sin(Date.now()/200):0;
  px(a.dir>0?x+10:x-1,by+7,2,5+(armW|0),tint(a.shirt,L));
  px(a.dir>0?x-1:x+10,by+7,2,5,tint(a.shirt,L));
  // Hands
  px(a.dir>0?x+10:x-1,by+12,2,1,tint(a.skin,L));
  px(a.dir>0?x-1:x+10,by+12,2,1,tint(a.skin,L));

  // Head
  px(x+1,by-1,10,7,tint(a.skin,L));

  // Hair
  if(isMage){
    // Wizard hat
    px(x,by-2,12,2,tint(a.shirt,L));
    px(x+1,by-4,10,2,tint(a.shirt,L));
    px(x+2,by-6,8,2,tint(a.shirt,L));
    px(x+3,by-8,6,2,tint(a.shirt,L));
    px(x+4,by-9,4,1,tint(a.shirt,L));
    px(x+5,by-10,2,1,'#f0c040'); // star
  } else {
    px(x+1,by-2,10,2,tint(a.hair,L));
    px(a.dir>0?x+9:x+1,by,2,3,tint(a.hair,L));
  }

  // Eyes (with highlights)
  const ex=a.dir>0?3:2;
  px(x+ex+1,by+2,2,2,tint('#1a1a2a',L));
  px(x+ex+5,by+2,2,2,tint('#1a1a2a',L));
  px(x+ex+2,by+2,1,1,'rgba(255,255,255,.5)');
  px(x+ex+6,by+2,1,1,'rgba(255,255,255,.5)');
  // Mouth
  px(x+5,by+5,3,1,tint('#c08060',L));

  // Coffee
  if(a.hasCoffee){
    const cx=a.dir>0?x+12:x-4;
    px(cx,by+10,3,3,'#f0f0f0');px(cx+1,by+9,1,1,'#806040');
  }

  ctx.globalAlpha=1;

  // ── Name tag ──
  ctx.font="4px 'Press Start 2P',monospace";
  const nm=ctx.measureText(a.name);
  const nw=nm.width;
  const nx=x+6-nw/2;
  const ny=by-13-(isMage?4:0);
  // Background pill
  ctx.fillStyle='rgba(16,16,22,.82)';
  ctx.beginPath();ctx.roundRect(nx-3,ny-4,nw+6,8,3);ctx.fill();
  // Status underline
  ctx.fillStyle=a.status==='working'?'rgba(44,182,125,.7)':a.status==='offline'?'rgba(85,85,85,.5)':'rgba(255,137,6,.6)';
  ctx.fillRect(nx-3,ny+4,nw+6,1);
  // Text
  ctx.fillStyle='#fff';
  ctx.fillText(a.name,nx,ny+2);

  // ── Speech bubble ──
  if(a.bubble) drawBubble(x+6,ny-6,a.bubble);
  else if(a.state==='working'&&a.task){
    const tt=a.task.length>18?a.task.substring(0,18)+'…':a.task;
    drawBubble(x+6,ny-6,tt);
  }
}

function drawBubble(x,y,text){
  ctx.font="3px 'Press Start 2P',monospace";
  const m=ctx.measureText(text);
  const bw=m.width+8,bh=8;
  const bx=x-bw/2,by=y-bh;
  // Bubble bg
  ctx.fillStyle='rgba(36,38,41,.92)';
  ctx.beginPath();ctx.roundRect(bx,by,bw,bh,3);ctx.fill();
  ctx.strokeStyle='rgba(58,61,68,.5)';ctx.lineWidth=.5;ctx.stroke();
  // Tail
  ctx.fillStyle='rgba(36,38,41,.92)';
  ctx.beginPath();ctx.moveTo(x-2,by+bh);ctx.lineTo(x,by+bh+2);ctx.lineTo(x+2,by+bh);ctx.fill();
  // Text
  ctx.fillStyle='#ddd';
  ctx.fillText(text,bx+4,by+5.5);
}

function canvasXY(e){
  const r=cv.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return{x:(cx-r.left)/r.width*VW,y:(cy-r.top)/r.height*VH}
}
function hitAgent(mx,my){
  for(let i=agents.length-1;i>=0;i--){
    const a=agents[i];
    const by=(a.state==='working'||a.state==='sitting')?a.y-10:a.y-18;
    if(mx>=a.x-4&&mx<=a.x+16&&my>=by-4&&my<=a.y+4)return a
  }
  return null
}

    agents.map((a,i)=>{
      const ps=a.status==='working'?'pill-w':a.status==='offline'?'pill-o':'pill-i';
      return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--brd);cursor:pointer" onclick="openSheet(agents[${i}])">
        <div style="display:flex;align-items:center;gap:8px"><div style="width:32px;height:32px;border-radius:8px;background:${a.shirt};display:flex;align-items:center;justify-content:center;font-size:14px">${a.spr==='mage'?'🧙‍♂️':'👤'}</div>
        <div><div style="font-size:clamp(6px,1.5vw,8px)">${a.name}</div><div style="font-size:clamp(5px,1.1vw,6px);color:var(--dim)">${a.role}</div></div></div>
        <span class="pill ${ps}" style="margin:0">${a.status}</span></div>`}).join('');
  sheet.classList.add('open');selAgent=null
}
function showFeed(){
  document.getElementById('feedBody').innerHTML='<h2>⚡ Activity Feed</h2>'+
    feed.slice(0,30).map(f=>`<div class="feed-item"><span class="fi-time">${f.time}</span><span><b>${f.name}</b> ${f.msg}</span></div>`).join('');
  document.getElementById('feedPanel').classList.add('open')
}
function closeFeed(){document.getElementById('feedPanel').classList.remove('open')}

// MODALS
function showAddModal(){
  const colors=Object.entries(SHIRTS);
  const ov=document.createElement('div');ov.className='modal-ov';
  ov.onclick=e=>{if(e.target===ov)ov.remove()};
  ov.innerHTML=`<div class="modal"><h2>➕ New Agent</h2>
    <div class="sfield"><label>Name</label><input id="nName" type="text" placeholder="Agent name..."/></div>
    <div class="sfield"><label>Role</label><input id="nRole" type="text" placeholder="Role..."/></div>
    <div class="sfield"><label>Color</label><div class="color-row">${colors.map(([n,c])=>`<div class="csw${n==='purple'?' sel':''}" data-color="${c}" style="background:${c}" onclick="document.querySelectorAll('.csw').forEach(s=>s.classList.remove('sel'));this.classList.add('sel')"></div>`).join('')}</div></div>
    <div class="btn-row"><button class="pbtn" onclick="this.closest('.modal-ov').remove()">Cancel</button><button class="pbtn green" onclick="doAdd()">Add</button></div></div>`;
  document.body.appendChild(ov)
}
function doAdd(){
  const n=document.getElementById('nName')?.value.trim();const r=document.getElementById('nRole')?.value.trim();
  const s=document.querySelector('.csw.sel');if(!n){showToast('❌ Enter a name');return}
  const c=s?s.dataset.color:'#888';const hairs=['#402010','#804020','#202020','#c0a040','#603010'];
  agents.push(new Agent(n,c,hairs[Math.random()*hairs.length|0],r||'Agent'));
  document.querySelector('.modal-ov')?.remove();showToast('✅ '+n+' joined!');updStatus()
}
function showBcastModal(){
  const ov=document.createElement('div');ov.className='modal-ov';
  ov.onclick=e=>{if(e.target===ov)ov.remove()};
  ov.innerHTML=`<div class="modal"><h2>📢 Broadcast</h2>
    <div class="sfield"><label>Message</label><input id="bMsg" type="text" placeholder="Hey everyone..."/></div>
    <div class="btn-row"><button class="pbtn" onclick="this.closest('.modal-ov').remove()">Cancel</button><button class="pbtn green" onclick="doBcast()">Send</button></div></div>`;
  document.body.appendChild(ov)
}
function doBcast(){
  const m=document.getElementById('bMsg')?.value.trim();if(!m)return;
  agents.forEach(a=>{if(a.status!=='offline')setTimeout(()=>{a.say(m,4);a.log('Broadcast: "'+m+'"')},Math.random()*1000)});
  document.querySelector('.modal-ov')?.remove();showToast('📢 Sent!')
}

function showToast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}
function showNotif(m){const n=document.createElement('div');n.className='notif';n.textContent='✅ '+m;document.body.appendChild(n);setTimeout(()=>n.remove(),4000)}

// ═══════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════
let lt=0;
function loop(ts){
  const dt=Math.min((ts-lt)/1000,.1);lt=ts;

  // Clock
  const t=getTime();
  document.getElementById('clock').textContent=`${String(t.h).padStart(2,'0')}:${String(t.m).padStart(2,'0')}`;
  const days=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  document.getElementById('date').textContent=days[t.d.getDay()]+' '+t.d.getDate();

  // Events
  nextEv-=dt;if(nextEv<=0){trigEv();nextEv=20+Math.random()*40}

  // Update agents
  agents.forEach(a=>a.update(dt));

  // Clear & draw
  ctx.clearRect(0,0,VW,VH);
  drawOffice();
  [...agents].sort((a,b)=>a.y-b.y).forEach(a=>drawAgent(a));

  requestAnimationFrame(loop)
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
initFloor();
resize();
window.addEventListener('load',()=>{setTimeout(()=>{document.getElementById('loading').classList.add('hide');setTimeout(()=>document.getElementById('loading').remove(),500)},600)});
requestAnimationFrame(loop);
</script>
