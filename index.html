<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>Aleksa's AI Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a2e;
  --bg2: #1e1e32;
  --surface: #2a2a44;
  --border: #4a3a5e;
  --border-hi: #8a7aae;
  --text: #e0e0e0;
  --text-dim: #8080a0;
  --text-dimmer: #6060a0;
  --accent: #f0c040;
  --accent2: #c0a020;
  --green: #40c040;
  --red: #e04040;
  --blue: #4080e8;
  --bar-h: 44px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --font: 'Press Start 2P', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  font-family: var(--font);
  color: var(--text);
  overflow: hidden;
  height: 100dvh;
  width: 100vw;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  position: fixed;
  top: 0; left: 0;
}

/* ── TOP BAR ── */
#topBar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--bar-h);
  background: linear-gradient(180deg, #2a1a3e, var(--bg));
  border-bottom: 2px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px; z-index: 100;
}
#topBar .office-name {
  color: var(--accent);
  font-size: clamp(7px, 2vw, 11px);
  text-shadow: 1px 1px 0 #000;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#topBar .info {
  color: var(--text-dim);
  font-size: clamp(6px, 1.5vw, 8px);
  display: flex; gap: 8px; align-items: center;
  flex-shrink: 0;
}

/* ── CANVAS ── */
#gameCanvas {
  position: fixed;
  top: var(--bar-h);
  left: 0; right: 0;
  bottom: var(--bar-h);
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  cursor: pointer;
  touch-action: none;
}

/* ── BOTTOM BAR ── */
#bottomBar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--bar-h) + var(--safe-b));
  padding-bottom: var(--safe-b);
  background: linear-gradient(0deg, #2a1a3e, var(--bg));
  border-top: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  padding-left: 8px; padding-right: 8px;
  gap: 6px; z-index: 100;
}

.pixel-btn {
  font-family: var(--font);
  font-size: clamp(6px, 1.8vw, 8px);
  padding: 8px 12px;
  background: #3a2a5e; color: #e0d0f0;
  border: 2px solid #6a5a8e;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.15s, transform 0.1s;
  white-space: nowrap;
  min-height: 36px;
  display: flex; align-items: center; gap: 4px;
  border-radius: 2px;
}
.pixel-btn:hover { background: #5a4a7e; }
.pixel-btn:active { transform: scale(0.95); }
.pixel-btn.danger { background: #5e2a2a; border-color: #8e5a5a; }
.pixel-btn.success { background: #2a5e2a; border-color: #5a8e5a; }

/* ── AGENT STATUS BAR (floating) ── */
#agentStatusBar {
  position: fixed;
  bottom: calc(var(--bar-h) + var(--safe-b) + 6px);
  left: 50%; transform: translateX(-50%);
  display: flex; gap: 4px;
  background: rgba(26,26,46,0.9);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 8px;
  z-index: 90;
  max-width: 95vw;
  overflow-x: auto;
  scrollbar-width: none;
}
#agentStatusBar::-webkit-scrollbar { display: none; }
.status-dot {
  display: flex; align-items: center; gap: 3px;
  font-size: clamp(5px, 1.2vw, 7px);
  color: var(--text-dim);
  white-space: nowrap;
  padding: 2px 4px;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.15s;
}
.status-dot:active { background: var(--surface); }
.status-dot .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-working { background: var(--green); box-shadow: 0 0 4px var(--green); }
.dot-idle { background: #e0e040; box-shadow: 0 0 4px #e0e040; }
.dot-offline { background: var(--red); }

/* ── BOTTOM SHEET (mobile panel) ── */
#bottomSheet {
  position: fixed;
  left: 0; right: 0;
  bottom: calc(var(--bar-h) + var(--safe-b));
  max-height: 70dvh;
  background: var(--bg2);
  border-top: 2px solid var(--border);
  border-radius: 12px 12px 0 0;
  z-index: 150;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
  display: flex; flex-direction: column;
}
#bottomSheet.open { transform: translateY(0); }

#sheetHandle {
  width: 100%; padding: 10px;
  display: flex; justify-content: center;
  cursor: grab; flex-shrink: 0;
}
#sheetHandle::after {
  content: '';
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
}

#sheetContent {
  padding: 0 16px 16px;
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}

#sheetContent h2 {
  font-size: clamp(9px, 2.5vw, 12px);
  color: var(--accent);
  margin-bottom: 4px;
  text-shadow: 1px 1px 0 #000;
}
#sheetContent .role-text {
  font-size: clamp(6px, 1.5vw, 8px);
  color: var(--text-dim);
  margin-bottom: 8px;
}
#sheetContent .s-badge {
  display: inline-block;
  padding: 3px 10px;
  font-size: clamp(6px, 1.5vw, 8px);
  font-family: var(--font);
  border-radius: 3px;
  margin-bottom: 10px;
}
.s-badge.working { background: #1a3a1a; color: #80ff80; border: 1px solid #2a5a2a; }
.s-badge.idle { background: #3a3a1a; color: #ffff80; border: 1px solid #5a5a2a; }
.s-badge.offline { background: #3a1a1a; color: #ff8080; border: 1px solid #5a2a2a; }
.s-badge.break { background: #1a2a3a; color: #80c0ff; border: 1px solid #2a4a5a; }

#sheetContent .task-text {
  font-size: clamp(6px, 1.5vw, 8px);
  color: #c0c0e0;
  margin-bottom: 10px;
  padding: 6px 8px;
  background: var(--surface);
  border-radius: 3px;
}

.sheet-btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 12px;
}
.sheet-btn-row .pixel-btn { justify-content: center; width: 100%; }

.sheet-field {
  margin-bottom: 8px;
}
.sheet-field label {
  font-size: clamp(5px, 1.2vw, 7px);
  color: var(--text-dim);
  display: block;
  margin-bottom: 4px;
}
.sheet-field input {
  width: 100%;
  padding: 10px;
  font-family: var(--font);
  font-size: clamp(7px, 1.8vw, 9px);
  background: var(--surface);
  color: var(--text);
  border: 2px solid var(--border);
  border-radius: 3px;
  outline: none;
}
.sheet-field input:focus { border-color: var(--border-hi); }

.activity-log {
  max-height: 150px;
  overflow-y: auto;
  margin-top: 6px;
}
.log-entry {
  font-size: clamp(5px, 1.2vw, 7px);
  color: var(--text-dim);
  padding: 4px 0;
  border-bottom: 1px solid #2a2a3a;
  line-height: 1.6;
}
.log-entry .time { color: var(--text-dimmer); }

/* ── OVERLAY / MODALS ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } }
.modal {
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: 6px;
  padding: 20px;
  width: 100%;
  max-width: 380px;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } }
.modal h2 {
  font-size: clamp(8px, 2vw, 11px);
  color: var(--accent);
  margin-bottom: 16px;
}
.modal .sheet-field { margin-bottom: 12px; }
.modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

.color-picker-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 6px 0; }
.color-swatch {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  transition: transform 0.1s;
}
.color-swatch.selected { border-color: var(--accent); box-shadow: 0 0 8px rgba(240,192,64,0.5); transform: scale(1.15); }

/* ── TOAST ── */
.toast {
  position: fixed;
  top: calc(var(--bar-h) + 8px);
  left: 50%; transform: translateX(-50%);
  background: var(--surface);
  border: 2px solid var(--border);
  padding: 8px 16px;
  font-size: clamp(6px, 1.5vw, 8px);
  font-family: var(--font);
  color: #e0d0f0;
  z-index: 300;
  border-radius: 4px;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  pointer-events: none;
  white-space: nowrap;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-10px); } }

/* ── NOTIFICATION BADGE ── */
.notif-badge {
  position: fixed;
  top: calc(var(--bar-h) + 8px);
  right: 12px;
  background: var(--green);
  color: #000;
  font-family: var(--font);
  font-size: 7px;
  padding: 6px 10px;
  border-radius: 4px;
  z-index: 90;
  animation: fadeIn 0.3s ease, toastOut 0.3s ease 3.7s forwards;
  pointer-events: none;
}

/* ── LOADING SCREEN ── */
#loadingScreen {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px;
  transition: opacity 0.5s ease;
}
#loadingScreen.hide { opacity: 0; pointer-events: none; }
#loadingScreen h1 {
  font-family: var(--font);
  font-size: clamp(10px, 3vw, 16px);
  color: var(--accent);
  text-shadow: 2px 2px 0 #000;
}
.loading-dots span {
  display: inline-block;
  width: 8px; height: 8px;
  background: var(--accent);
  margin: 0 4px;
  animation: bounce 1.2s infinite ease-in-out;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }

/* ── DESKTOP tweaks ── */
@media (min-width: 769px) {
  #bottomSheet { max-width: 360px; right: 8px; left: auto; border-radius: 12px 12px 0 0; }
  .pixel-btn { padding: 8px 14px; }
}
</style>
</head>
<body>

<div id="loadingScreen">
  <h1>🏢 AI Office</h1>
  <div class="loading-dots"><span></span><span></span><span></span></div>
</div>

<div id="topBar">
  <div class="office-name">🏢 Aleksa's AI Office</div>
  <div class="info">
    <span id="clockDisplay">--:--</span>
    <span id="dateDisplay"></span>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="agentStatusBar"></div>

<div id="bottomSheet">
  <div id="sheetHandle"></div>
  <div id="sheetContent"></div>
</div>

<div id="bottomBar">
  <button class="pixel-btn" onclick="showAddAgentModal()">➕ Agent</button>
  <button class="pixel-btn" onclick="showBroadcastModal()">📢</button>
  <button class="pixel-btn" onclick="triggerRandomEvent()">🎲</button>
  <div style="flex:1"></div>
  <span style="font-size:clamp(5px,1.2vw,7px);color:var(--text-dimmer)" id="fpsDisplay"></span>
</div>

<script>
// ============================================================
// PIXEL OFFICE — Mobile-First Rewrite
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ── RESPONSIVE SIZING ──
const OFFICE_W = 320;
const OFFICE_H = 180;
let PX = 3;
let canvasScale = 1;

function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight - 88; // top + bottom bars
  // Calculate PX to fill screen nicely
  const scaleX = w / OFFICE_W;
  const scaleY = h / OFFICE_H;
  canvasScale = Math.min(scaleX, scaleY);
  // Set canvas internal resolution
  canvas.width = OFFICE_W * PX;
  canvas.height = OFFICE_H * PX;
  // Scale canvas to fill
  const cw = Math.floor(OFFICE_W * canvasScale);
  const ch = Math.floor(OFFICE_H * canvasScale);
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  canvas.style.left = Math.floor((w - cw) / 2) + 'px';
  canvas.style.top = Math.floor(44 + (h - ch) / 2) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ── PIXEL HELPERS ──
function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * PX, y * PX, w * PX, h * PX);
}
function lerpColor(c1, c2, t) {
  t = Math.max(0, Math.min(1, t));
  const r1=parseInt(c1.slice(1,3),16), g1=parseInt(c1.slice(3,5),16), b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16), g2=parseInt(c2.slice(3,5),16), b2=parseInt(c2.slice(5,7),16);
  return `rgb(${Math.floor(r1+(r2-r1)*t)},${Math.floor(g1+(g2-g1)*t)},${Math.floor(b1+(b2-b1)*t)})`;
}

// ── TIME ──
function getTimeInfo() {
  const now = new Date();
  return { h: now.getHours(), m: now.getMinutes(), s: now.getSeconds(), now };
}
function getSkyColor() {
  const { h } = getTimeInfo();
  if (h >= 6 && h < 8) return { top:'#ff9966', bot:'#ffcc99', light: 0.5+(h-6)*0.25 };
  if (h >= 8 && h < 17) return { top:'#4a90d9', bot:'#87ceeb', light: 1 };
  if (h >= 17 && h < 19) return { top:'#ff6633', bot:'#ffaa66', light: 1-(h-17)*0.25 };
  if (h >= 19 && h < 21) return { top:'#2a1a4e', bot:'#4a3a6e', light: 0.3 };
  return { top:'#0a0a1e', bot:'#1a1a3e', light: 0.15 };
}

// ── OFFICE LAYOUT ──
const FLOOR_Y = 145;
const WALL_Y = 36;
const CEILING_Y = 26;

const furniture = {
  desks: [
    { x:25, y:FLOOR_Y-20, id:'d0' }, { x:65, y:FLOOR_Y-20, id:'d1' },
    { x:105, y:FLOOR_Y-20, id:'d2' }, { x:165, y:FLOOR_Y-20, id:'d3' },
    { x:205, y:FLOOR_Y-20, id:'d4' }, { x:245, y:FLOOR_Y-20, id:'d5' },
  ],
  couch: { x:135, y:FLOOR_Y-14, id:'couch' },
  coffee: { x:278, y:FLOOR_Y-20, id:'coffee' },
  water: { x:295, y:FLOOR_Y-18, id:'water' },
  plants: [{ x:8, y:FLOOR_Y-22 }, { x:155, y:FLOOR_Y-24 }, { x:305, y:FLOOR_Y-22 }],
  whiteboard: { x:88, y:WALL_Y+4 },
  door: { x:4, y:WALL_Y },
  clock: { x:198, y:WALL_Y+2 },
  windows: [{ x:48, y:WALL_Y }, { x:148, y:WALL_Y }, { x:238, y:WALL_Y }],
};

// ── AGENT CLASS ──
const SHIRT_PRESETS = {
  purple:'#7030a0', blue:'#3060c0', green:'#308030', red:'#c03030',
  yellow:'#c0a020', orange:'#d06020', cyan:'#20a0a0', pink:'#c04080'
};

class Agent {
  constructor(name, shirtColor, hairColor, role, sprite) {
    this.name = name;
    this.shirtColor = shirtColor;
    this.hairColor = hairColor || '#402010';
    this.skinColor = '#e8b880';
    this.pantsColor = '#304060';
    this.role = role || 'Agent';
    this.sprite = sprite || null;
    this.x = 40 + Math.random() * 240;
    this.y = FLOOR_Y;
    this.targetX = this.x;
    this.speed = 0.4 + Math.random() * 0.2;
    this.direction = 1;
    this.animFrame = 0;
    this.animTimer = 0;
    this.state = 'idle';
    this.status = 'idle';
    this.task = '';
    this.speechBubble = '';
    this.speechTimer = 0;
    this.hasCoffee = false;
    this.assignedDesk = null;
    this.stateTimer = 0;
    this.nextBehavior = 3 + Math.random() * 8;
    this.activityLog = [];
    this._pending = null;
    this.log('Arrived at the office');
  }
  log(msg) {
    const t = getTimeInfo();
    this.activityLog.unshift({ time: `${String(t.h).padStart(2,'0')}:${String(t.m).padStart(2,'0')}`, msg });
    if (this.activityLog.length > 30) this.activityLog.pop();
  }
  say(text, dur) { this.speechBubble = text; this.speechTimer = dur || 4; }
  assignTask(task) {
    this.task = task; this.status = 'working'; this.state = 'walking';
    const free = furniture.desks.filter(d => !agents.some(a => a !== this && a.assignedDesk === d.id && a.status === 'working'));
    const desk = free.length ? free[Math.floor(Math.random()*free.length)] : furniture.desks[0];
    this.assignedDesk = desk.id;
    this.targetX = desk.x + 10;
    this.say('On it! 💻', 3);
    this.log('Started: ' + task);
    updateStatusBar();
  }
  makeIdle() {
    this.status = 'idle'; this.state = 'idle'; this.task = ''; this.assignedDesk = null;
    this.nextBehavior = 2 + Math.random() * 5; this.stateTimer = 0;
    this.say('Break time ☕', 2); this.log('Now idle');
    updateStatusBar();
  }
  makeOffline() { this.status = 'offline'; this.state = 'idle'; this.task = ''; this.log('Went offline'); updateStatusBar(); }
  update(dt) {
    this.animTimer += dt;
    if (this.animTimer > 0.2) { this.animFrame = (this.animFrame + 1) % 4; this.animTimer = 0; }
    if (this.speechTimer > 0) { this.speechTimer -= dt; if (this.speechTimer <= 0) this.speechBubble = ''; }
    this.stateTimer += dt;
    if (this.status === 'offline') return;

    if (this.state === 'walking') {
      const dx = this.targetX - this.x;
      const spd = this.hasCoffee ? this.speed * 0.6 : this.speed;
      if (Math.abs(dx) > 1) {
        this.direction = dx > 0 ? 1 : -1;
        this.x += this.direction * spd * dt * 60;
      } else { this.x = this.targetX; this.onArrived(); }
    }
    if (this.status === 'idle' && this.state !== 'walking') {
      this.nextBehavior -= dt;
      if (this.nextBehavior <= 0) { this.pickIdle(); this.nextBehavior = 5 + Math.random() * 12; }
    }
    if (this.status === 'working' && this.state === 'working' && this.stateTimer > 25 + Math.random() * 35) {
      this.say('Done! ✅', 3); this.log('Completed: ' + this.task);
      showNotif(this.name + ' finished a task!');
      this.makeIdle();
    }
  }
  onArrived() {
    if (this.status === 'working') { this.state = 'working'; this.stateTimer = 0; return; }
    if (this._pending === 'coffee') {
      this.state = 'coffee'; this.say('☕ Brewing...', 3); this.log('Getting coffee');
      setTimeout(() => { if (this.state === 'coffee') { this.hasCoffee = true; this.say('☕', 2); this.state = 'idle'; } }, 3000);
    } else if (this._pending === 'couch') {
      this.state = 'sitting'; this.say('😌', 2); this.log('Relaxing');
    } else if (this._pending === 'water') {
      this.state = 'idle'; this.say('💧', 2); this.log('Hydrating');
    } else { this.state = 'idle'; }
    this._pending = null;
  }
  pickIdle() {
    const b = ['wander','wander','coffee','couch','water','wander'][Math.floor(Math.random()*6)];
    this._pending = b; this.state = 'walking';
    if (b === 'coffee') this.targetX = furniture.coffee.x + 2;
    else if (b === 'couch') this.targetX = furniture.couch.x + Math.random() * 16;
    else if (b === 'water') this.targetX = furniture.water.x + 2;
    else this.targetX = 20 + Math.random() * 280;
  }
}

let agents = [
  new Agent('Supreme Magus', '#7030a0', '#2a1040', 'AI Wizard', 'mage'),
  new Agent('Research Bot', '#3060c0', '#804020', 'Researcher'),
  new Agent('Code Monkey', '#308030', '#202020', 'Developer'),
  new Agent('Data Cruncher', '#c03030', '#603010', 'Analyst'),
  new Agent('Pixel Pete', '#c0a020', '#c0a040', 'Office Mgr'),
];
agents[0].assignTask('Orchestrating agent workflows');
agents[2].assignTask('Refactoring the main module');

// ── DRAWING ──
function drawSky() {
  const sky = getSkyColor();
  for (let i = 0; i < 20; i++) {
    const t = i / 20;
    const [r1,g1,b1] = [sky.top,sky.bot].map(c => [parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)]);
    const r = Math.floor(r1[0][0] + (r1[1][0] - r1[0][0]) * t);
    // Simplified: just fill gradient
    px(0, CEILING_Y - 20 + i, OFFICE_W, 1, lerpColor(sky.top, sky.bot, t));
  }
}

function drawAgent(agent) {
  const x = Math.round(agent.x);
  const y = agent.y;
  const dir = agent.direction;
  const frame = agent.animFrame;
  const isWalking = agent.state === 'walking';
  const isSitting = agent.state === 'working' || agent.state === 'sitting';
  const isMage = agent.sprite === 'mage';

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse((x+4)*PX, (y+1)*PX, 5*PX, 1.5*PX, 0, 0, Math.PI*2);
  ctx.fill();

  const bodyY = isSitting ? y - 14 : y - 20;
  const legOff = isWalking ? Math.sin(frame * Math.PI/2) * 2 : 0;

  if (agent.status === 'offline') ctx.globalAlpha = 0.4;

  // Legs
  if (!isSitting) {
    px(x+2, bodyY+14, 2, 4+legOff, agent.pantsColor);
    px(x+5, bodyY+14, 2, 4-legOff, agent.pantsColor);
    px(x+1, bodyY+18+legOff, 3, 2, '#2a2020');
    px(x+5, bodyY+18-legOff, 3, 2, '#2a2020');
  } else {
    px(x+1, bodyY+14, 3, 2, agent.pantsColor);
    px(x+5, bodyY+14, 3, 2, agent.pantsColor);
    px(x, bodyY+16, 3, 2, agent.pantsColor);
    px(x+6, bodyY+16, 3, 2, agent.pantsColor);
  }

  // Body
  if (isMage) {
    px(x+1, bodyY+6, 7, 8, agent.shirtColor);
    px(x, bodyY+10, 9, 4, agent.shirtColor);
    px(x+1, bodyY+13, 7, 1, '#f0c040');
  } else {
    px(x+1, bodyY+6, 7, 8, agent.shirtColor);
  }

  // Arms
  const armWave = agent.state === 'working' ? Math.sin(Date.now()/150) : 0;
  px(dir===1?x+7:x, bodyY+7, 2, 5+armWave, agent.shirtColor);
  px(dir===1?x:x+7, bodyY+7, 2, 5, agent.shirtColor);
  px(dir===1?x+7:x, bodyY+12, 2, 1, agent.skinColor);
  px(dir===1?x:x+7, bodyY+12, 2, 1, agent.skinColor);

  // Head
  px(x+1, bodyY, 7, 6, agent.skinColor);

  // Hair / Hat
  if (isMage) {
    px(x, bodyY-1, 9, 2, agent.shirtColor);
    px(x+1, bodyY-3, 7, 2, agent.shirtColor);
    px(x+2, bodyY-5, 5, 2, agent.shirtColor);
    px(x+3, bodyY-6, 3, 1, agent.shirtColor);
    px(x+4, bodyY-7, 1, 1, '#f0c040');
  } else {
    px(x+1, bodyY-1, 7, 2, agent.hairColor);
    px(dir===1?x+7:x+1, bodyY, 1, 3, agent.hairColor);
  }

  // Eyes
  px(dir===1?x+4:x+2, bodyY+2, 1, 1, '#000');
  px(dir===1?x+6:x+4, bodyY+2, 1, 1, '#000');
  // Mouth
  px(x+4, bodyY+4, 2, 1, '#c08060');

  // Coffee cup
  if (agent.hasCoffee) {
    const cx = dir===1 ? x+8 : x-3;
    px(cx, bodyY+10, 3, 3, '#f0f0f0');
    px(cx+1, bodyY+9, 1, 1, '#a08060');
  }

  ctx.globalAlpha = 1;

  // Name tag with background
  const nameY = bodyY - 10;
  ctx.font = `${3*PX}px 'Press Start 2P', monospace`;
  const nm = ctx.measureText(agent.name);
  const nw = nm.width / PX;
  const nx = x + 4 - nw/2;
  // Background
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  const pad = 2;
  ctx.fillRect((nx-pad)*PX, (nameY-4)*PX, (nw+pad*2)*PX, 6*PX);
  // Border
  ctx.fillStyle = agent.status==='working'?'rgba(64,192,64,0.4)':agent.status==='offline'?'rgba(224,64,64,0.3)':'rgba(224,224,64,0.3)';
  ctx.fillRect((nx-pad)*PX, (nameY+2)*PX, (nw+pad*2)*PX, PX);
  // Text
  ctx.fillStyle = '#fff';
  ctx.fillText(agent.name, nx*PX, (nameY)*PX);

  // Speech bubble
  if (agent.speechBubble) drawBubble(x+4, nameY-8, agent.speechBubble);
  else if (agent.state==='working' && agent.task) drawBubble(x+4, nameY-8, agent.task.substring(0,22)+(agent.task.length>22?'…':''));
}

function drawBubble(x, y, text) {
  ctx.font = `${3*PX}px 'Press Start 2P', monospace`;
  const m = ctx.measureText(text);
  const bw = m.width/PX + 8;
  const bh = 8;
  const bx = x - bw/2;
  const by = y - bh;

  // Rounded bubble
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  const r = 2 * PX;
  ctx.roundRect(bx*PX, by*PX, bw*PX, bh*PX, r);
  ctx.fill();
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = PX * 0.5;
  ctx.stroke();

  // Tail
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo((x-1)*PX, (by+bh)*PX);
  ctx.lineTo(x*PX, (by+bh+2)*PX);
  ctx.lineTo((x+1)*PX, (by+bh)*PX);
  ctx.fill();

  // Text
  ctx.fillStyle = '#222';
  ctx.fillText(text, (bx+4)*PX, (by+5.5)*PX);
}

// ── TOUCH & CLICK ──
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left) / rect.width * OFFICE_W,
    y: (clientY - rect.top) / rect.height * OFFICE_H
  };
}

function hitTestAgents(mx, my) {
  for (let i = agents.length-1; i >= 0; i--) {
    const a = agents[i];
    const ay = (a.state==='working'||a.state==='sitting') ? a.y-14 : a.y-20;
    if (mx >= a.x-4 && mx <= a.x+14 && my >= ay-2 && my <= a.y+2) return a;
  }
  return null;
}

canvas.addEventListener('click', e => {
  const p = getCanvasPos(e);
  const a = hitTestAgents(p.x, p.y);
  if (a) openSheet(a);
  else closeSheet();
});

// Touch support
let touchStartTime = 0;
canvas.addEventListener('touchstart', e => { touchStartTime = Date.now(); }, { passive: true });
canvas.addEventListener('touchend', e => {
  const dt = Date.now() - touchStartTime;
  if (dt > 500) {
    // Long press — handled via touchend
    const touch = e.changedTouches[0];
    const rect = canvas.getBoundingClientRect();
    const mx = (touch.clientX - rect.left) / rect.width * OFFICE_W;
    const my = (touch.clientY - rect.top) / rect.height * OFFICE_H;
    const a = hitTestAgents(mx, my);
    if (a) { openSheet(a); }
  }
}, { passive: true });

const sheet = document.getElementById('bottomSheet');

function openSheet(agent) {
  selectedAgent = agent;
  sheet.classList.add('open');
  renderSheet();
}
function closeSheet() {
  sheet.classList.remove('open');

}

document.getElementById('sheetHandle').addEventListener('touchstart', e => {
  sheetTouchY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('sheetHandle').addEventListener('touchmove', e => {
  const dy = e.touches[0].clientY - sheetTouchY;

function renderSheet() {

      <button class="pixel-btn success" onclick="sheetAssign()">📝 Task</button>
      <button class="pixel-btn" onclick="sheetIdle()">☕ Idle</button>
      <button class="pixel-btn" onclick="sheetMsg()">💬 Say</button>
      <button class="pixel-btn danger" onclick="sheetToggle()">${a.status==='offline'?'🟢 On':'🔴 Off'}</button>
    </div>

    <div class="sheet-field">
      <label>ASSIGN TASK</label>
      <input type="text" id="taskIn" placeholder="Enter task..." value="${a.task||''}" />

}

function sheetAssign() { document.getElementById('taskIn')?.focus(); }
function sheetIdle() { if (selectedAgent) { selectedAgent.makeIdle(); renderSheet(); } }
function sheetMsg() { document.getElementById('msgIn')?.focus(); }
function sheetToggle() {
  if (!selectedAgent) return;
  if (selectedAgent.status === 'offline') {
    selectedAgent.status = 'idle'; selectedAgent.state = 'idle';
    selectedAgent.say("I'm back! 👋", 3); selectedAgent.log('Back online');
  } else { selectedAgent.makeOffline(); }
  renderSheet(); updateStatusBar();
}
function submitTask() {
  const v = document.getElementById('taskIn')?.value.trim();
  if (v && selectedAgent) { selectedAgent.assignTask(v); renderSheet(); }
}
function submitMsg() {
  const v = document.getElementById('msgIn')?.value.trim();
  if (v && selectedAgent) { selectedAgent.say(v, 5); selectedAgent.log('Said: "'+v+'"'); document.getElementById('msgIn').value=''; renderSheet(); }
}

// Enter key on inputs
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSheet();
  if (e.key === 'Enter') {
    if (document.activeElement?.id === 'taskIn') submitTask();
    if (document.activeElement?.id === 'msgIn') submitMsg();
    if (document.activeElement?.id === 'broadcastMsg') doBroadcast();
    if (document.activeElement?.id === 'newAgentName') doAddAgent();
  }
});

// ── GAME LOOP ──
let lastTime = 0, frameCount = 0, fpsTime = 0;

function gameLoop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.1);
  lastTime = ts;

  frameCount++; fpsTime += dt;
  if (fpsTime >= 1) {
    document.getElementById('fpsDisplay').textContent = frameCount + ' FPS';
    frameCount = 0; fpsTime = 0;
  }

  // Clock
  const ti = getTimeInfo();
  document.getElementById('clockDisplay').textContent = `${String(ti.h).padStart(2,'0')}:${String(ti.m).padStart(2,'0')}`;
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  document.getElementById('dateDisplay').textContent = days[ti.now.getDay()] + ' ' + ti.now.getDate();

  // Events
  nextEventTime -= dt;
  if (nextEventTime <= 0) { triggerRandomEvent(); nextEventTime = 20 + Math.random() * 40; }

  // Update agents
  agents.forEach(a => a.update(dt));

  // Draw
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawOffice();
  [...agents].sort((a,b) => a.y - b.y).forEach(a => drawAgent(a));

  requestAnimationFrame(gameLoop);
}

// ── LOADING ──
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loadingScreen').classList.add('hide');
    setTimeout(() => document.getElementById('loadingScreen').remove(), 500);
  }, 800);
});

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
