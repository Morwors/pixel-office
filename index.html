<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>Aleksa's AI Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);--accent:#7c5cfc;--accent2:#5a3ef0;--green:#2dd4a0;--red:#f0506e;--orange:#ff9f43;--bg:#0e0e14;--card:rgba(18,18,26,.95);--card-border:rgba(255,255,255,.06);--text:rgba(255,255,255,.87);--text2:rgba(255,255,255,.5);--text3:rgba(255,255,255,.25)}
body{background:var(--bg);overflow:hidden;height:100dvh;width:100vw;user-select:none;-webkit-user-select:none;position:fixed;font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--text)}
canvas{position:fixed;top:0;left:0;image-rendering:pixelated;image-rendering:crisp-edges;touch-action:none}

/* ─── Top bar ─── */
#topBar{position:fixed;top:0;left:0;right:0;height:calc(44px + var(--safe-t));padding-top:var(--safe-t);display:flex;align-items:center;justify-content:space-between;padding-left:16px;padding-right:16px;z-index:50;pointer-events:none;background:linear-gradient(to bottom,rgba(10,10,15,.85) 0%,rgba(10,10,15,.4) 70%,transparent 100%)}
#topBar>*{pointer-events:auto}
.top-left{display:flex;align-items:center;gap:10px}
.top-title{font-family:'Press Start 2P',monospace;font-size:9px;color:rgba(255,255,255,.6);letter-spacing:1px}
.top-clock{font-family:'Press Start 2P',monospace;font-size:8px;color:rgba(255,255,255,.4);padding:4px 10px;background:rgba(255,255,255,.06);border-radius:8px;border:1px solid var(--card-border)}
.top-right{display:flex;align-items:center;gap:8px}
.top-btn{width:32px;height:32px;border-radius:10px;border:1px solid var(--card-border);background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .15s}
.top-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}
.top-btn:active{transform:scale(.92)}
.top-btn.accent{background:rgba(124,92,252,.15);border-color:rgba(124,92,252,.25);color:var(--accent)}

/* ─── Agent bar (bottom) ─── */
#agentBar{position:fixed;bottom:calc(12px + var(--safe-b));left:50%;transform:translateX(-50%);display:flex;gap:4px;padding:4px;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:16px;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.agent-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:12px;cursor:pointer;transition:all .15s;position:relative;white-space:nowrap}
.agent-chip:hover{background:rgba(255,255,255,.06)}
.agent-chip:active{transform:scale(.96)}
.agent-chip.sel{background:rgba(124,92,252,.12)}
.chip-avatar{width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.chip-info{display:flex;flex-direction:column;gap:1px}
.chip-name{font-size:10px;font-weight:600;color:var(--text)}
.chip-status{font-size:8px;font-weight:500}
.chip-status.working{color:var(--green)}
.chip-status.idle{color:var(--orange)}
.chip-status.offline{color:var(--text3)}
.chip-dot{position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--bg)}
.chip-dot.working{background:var(--green)}
.chip-dot.idle{background:var(--orange)}
.chip-dot.offline{background:rgba(255,255,255,.15)}

/* ─── Side panel ─── */
#panel{position:fixed;top:calc(52px + var(--safe-t));right:12px;width:320px;max-height:calc(100dvh - 120px - var(--safe-t) - var(--safe-b));background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:16px;z-index:100;overflow:hidden;display:flex;flex-direction:column;opacity:0;transform:translateX(10px) scale(.98);pointer-events:none;transition:all .2s cubic-bezier(.4,0,.2,1);box-shadow:0 8px 40px rgba(0,0,0,.5)}
#panel.open{opacity:1;transform:translateX(0) scale(1);pointer-events:auto}
#panelBody{padding:16px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}

/* Panel content */
.p-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.p-avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.p-name{font-weight:600;font-size:14px;margin-bottom:2px}
.p-role{font-size:11px;color:var(--text2)}
.p-close{width:28px;height:28px;border-radius:8px;border:1px solid var(--card-border);background:rgba(255,255,255,.04);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;margin-left:auto;transition:all .12s}
.p-close:hover{background:rgba(255,255,255,.08)}

.p-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:600;padding:3px 10px;border-radius:6px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.p-badge.working{background:rgba(45,212,160,.1);color:var(--green);border:1px solid rgba(45,212,160,.15)}
.p-badge.idle{background:rgba(255,159,67,.08);color:var(--orange);border:1px solid rgba(255,159,67,.12)}
.p-badge.offline{background:rgba(255,255,255,.03);color:var(--text3);border:1px solid var(--card-border)}
.p-badge::before{content:'';width:5px;height:5px;border-radius:50%}
.p-badge.working::before{background:var(--green)}
.p-badge.idle::before{background:var(--orange)}
.p-badge.offline::before{background:var(--text3)}

.p-task-card{padding:10px 12px;background:rgba(45,212,160,.04);border:1px solid rgba(45,212,160,.1);border-radius:10px;margin-bottom:14px;font-size:11px;color:rgba(45,212,160,.9);display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.p-task-card .task-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.p-task-card .task-progress{margin-top:6px;height:3px;background:rgba(45,212,160,.1);border-radius:2px;overflow:hidden}
.p-task-card .task-progress-bar{height:100%;background:var(--green);border-radius:2px;transition:width .5s}

.p-section{margin-bottom:14px}
.p-label{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.p-input{width:100%;padding:10px 12px;font-family:'Inter',sans-serif;font-size:12px;background:rgba(255,255,255,.03);color:var(--text);border:1px solid var(--card-border);border-radius:10px;outline:none;transition:border-color .2s}
.p-input:focus{border-color:rgba(124,92,252,.4)}
.p-input::placeholder{color:var(--text3)}
.p-input-row{display:flex;gap:6px}
.p-input-row .p-input{flex:1}

.p-btn{font-family:'Inter',sans-serif;font-size:11px;font-weight:500;padding:8px 14px;border:1px solid var(--card-border);border-radius:8px;cursor:pointer;transition:all .12s;background:rgba(255,255,255,.04);color:var(--text2);white-space:nowrap}
.p-btn:hover{background:rgba(255,255,255,.08)}
.p-btn:active{transform:scale(.97)}
.p-btn.accent{background:rgba(124,92,252,.12);border-color:rgba(124,92,252,.2);color:#b3a0ff}
.p-btn.green{background:rgba(45,212,160,.1);border-color:rgba(45,212,160,.15);color:var(--green)}
.p-btn.red{background:rgba(240,80,110,.08);border-color:rgba(240,80,110,.12);color:var(--red)}
.p-btn.full{width:100%}
.p-btn.sm{padding:6px 10px;font-size:10px}

.p-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}

.p-log{margin-top:6px}
.p-log-item{font-size:10px;color:var(--text2);padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);line-height:1.5;display:flex;gap:8px}
.p-log-item .log-time{color:var(--text3);font-size:9px;font-family:'Press Start 2P',monospace;flex-shrink:0;margin-top:1px}

/* ─── Menu panel ─── */
.menu-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:opacity .12s}
.menu-item:last-child{border:none}
.menu-item:hover{opacity:.8}
.menu-item:active{opacity:.5}
.menu-item .m-icon{font-size:16px;width:24px;text-align:center}
.menu-item .m-text{font-size:12px;color:var(--text2)}

/* ─── Modal ─── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:center;justify-content:center;animation:mfadein .15s ease}
@keyframes mfadein{from{opacity:0}}
.modal-card{background:#16161e;border:1px solid var(--card-border);border-radius:16px;padding:24px;width:90%;max-width:380px;animation:mslideup .2s ease;box-shadow:0 20px 60px rgba(0,0,0,.6)}
@keyframes mslideup{from{transform:translateY(10px);opacity:.5}}
.modal-card h2{font-size:14px;font-weight:600;margin-bottom:16px}
.modal-card .btn-row{display:flex;gap:6px;justify-content:flex-end;margin-top:16px}
.color-row{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.csw{width:28px;height:28px;border:2px solid rgba(255,255,255,.08);border-radius:8px;cursor:pointer;transition:all .1s}
.csw:hover{transform:scale(1.05)}
.csw.sel{border-color:var(--accent);box-shadow:0 0 12px rgba(124,92,252,.3);transform:scale(1.1)}

/* ─── Toast ─── */
.toast{position:fixed;top:calc(52px + var(--safe-t));left:50%;transform:translateX(-50%);background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--card-border);padding:8px 16px;font-size:11px;font-family:'Inter',sans-serif;color:var(--text);z-index:400;border-radius:10px;animation:mfadein .2s ease,tfadeout .3s ease 2.7s forwards;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4)}
@keyframes tfadeout{to{opacity:0;transform:translateX(-50%) translateY(-6px)}}

/* ─── Loading ─── */
#loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .5s}
#loading.hide{opacity:0;pointer-events:none}
#loading h1{font-family:'Press Start 2P',monospace;font-size:12px;color:rgba(255,255,255,.8);letter-spacing:1px}
#loading p{font-size:11px;color:var(--text3)}
.ldots{display:flex;gap:4px}
.ldots span{width:6px;height:6px;background:var(--accent);border-radius:2px;animation:bounce 1s infinite ease-in-out}
.ldots span:nth-child(2){animation-delay:.12s}
.ldots span:nth-child(3){animation-delay:.24s}
@keyframes bounce{0%,80%,100%{transform:scaleY(.4)}40%{transform:scaleY(1)}}

/* ─── Responsive ─── */
@media(max-width:640px){
  #panel{top:auto;bottom:0;right:0;left:0;width:100%;max-height:65dvh;border-radius:20px 20px 0 0;transform:translateY(10px);padding-bottom:var(--safe-b)}
  #panel.open{transform:translateY(0)}
  #agentBar{max-width:calc(100vw - 24px);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  #agentBar::-webkit-scrollbar{display:none}
  .chip-info{display:none}
  .agent-chip{padding:6px 8px}
}
@media(min-width:641px) and (max-width:900px){
  #panel{width:280px}
}
</style>
</head>
<body>
<div id="loading"><h1>🏢 AI OFFICE</h1><p>Booting workspace...</p><div class="ldots"><span></span><span></span><span></span></div></div>
<canvas id="c"></canvas>

<!-- Top bar -->
<div id="topBar">
  <div class="top-left">
    <span class="top-title">AI OFFICE</span>
    <span class="top-clock" id="clock">--:--</span>
  </div>
  <div class="top-right">
    <div class="top-btn" onclick="toggleMenu()" title="Menu">☰</div>
  </div>
</div>

<!-- Agent bar -->
<div id="agentBar"></div>

<!-- Side panel -->
<div id="panel"><div id="panelBody"></div></div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const VW = 480, VH = 270;
const WALL_TOP = 10, WALL_BOT = 95, WALK_Y_MIN = 130, WALK_Y_MAX = 250;

const cv = document.getElementById('c');
const ctx = cv.getContext('2d');

// ═══════════════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════════════
let camX = 0, camY = 0, camZ = 1, screenW = 0, screenH = 0, baseScale = 1;

function resize() {
  screenW = window.innerWidth;
  screenH = window.innerHeight;
  baseScale = Math.max(screenW / VW, screenH / VH);
  cv.width = VW; cv.height = VH;
  cv.style.transformOrigin = '0 0';
  clampCam(); applyTransform();
}

function clampCam() {
  const s = baseScale * camZ;
  const rw = VW * s, rh = VH * s;
  camX = rw <= screenW ? (screenW - rw) / 2 : Math.min(0, Math.max(screenW - rw, camX));
  camY = rh <= screenH ? (screenH - rh) / 2 : Math.min(0, Math.max(screenH - rh, camY));
}

function applyTransform() {
  cv.style.transform = `translate(${camX}px,${camY}px) scale(${baseScale * camZ})`;
}

window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function px(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x, y, w, h); }

function getTime() {
  const n = new Date();
  return { h: n.getHours(), m: n.getMinutes(), s: n.getSeconds() };
}

function daylight() {
  const h = getTime().h + getTime().m / 60;
  if (h >= 7 && h < 17) return 1;
  if (h >= 6 && h < 7) return .55 + .45 * (h - 6);
  if (h >= 17 && h < 20) return .55 + .45 * (1 - (h - 17) / 3);
  return .55;
}

function tint(hex, L) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgb(${r * L | 0},${g * L | 0},${b * L | 0})`;
}

function lerpColor(hex1, hex2, t) {
  const r1 = parseInt(hex1.slice(1, 3), 16), g1 = parseInt(hex1.slice(3, 5), 16), b1 = parseInt(hex1.slice(5, 7), 16);
  const r2 = parseInt(hex2.slice(1, 3), 16), g2 = parseInt(hex2.slice(3, 5), 16), b2 = parseInt(hex2.slice(5, 7), 16);
  return `rgb(${r1 + (r2 - r1) * t | 0},${g1 + (g2 - g1) * t | 0},${b1 + (b2 - b1) * t | 0})`;
}

// ═══════════════════════════════════════════════════════
// PRE-RENDERED FLOOR
// ═══════════════════════════════════════════════════════
let floorImg = null;
function initFloor() {
  const fc = document.createElement('canvas');
  fc.width = VW; fc.height = VH;
  const fx = fc.getContext('2d');
  const fy0 = WALL_BOT;
  for (let py = fy0; py < VH; py++) {
    for (let px = 0; px < VW; px++) {
      const row = Math.floor((py - fy0) / 8);
      const offset = (row % 2) * 14;
      const plankInRow = Math.floor((px + offset) / 28);
      const localX = (px + offset) % 28;
      const localY = (py - fy0) % 8;
      const isGapX = localX === 0;
      const isGapY = localY === 0;
      if (isGapX || isGapY) {
        fx.fillStyle = '#5a4a38';
      } else {
        const seed = (plankInRow * 7 + row * 13) % 5;
        const bases = ['#c49b6e', '#d4a876', '#b8905e', '#cca56c', '#d8b080'];
        const grain = Math.sin(px * 0.8 + seed * 40) * 3 + Math.sin(py * 0.3) * 2;
        const r = parseInt(bases[seed].slice(1, 3), 16) + grain;
        const g = parseInt(bases[seed].slice(3, 5), 16) + grain;
        const b = parseInt(bases[seed].slice(5, 7), 16) + grain;
        fx.fillStyle = `rgb(${Math.max(0, Math.min(255, r | 0))},${Math.max(0, Math.min(255, g | 0))},${Math.max(0, Math.min(255, b | 0))})`;
      }
      fx.fillRect(px, py, 1, 1);
    }
  }
  floorImg = fc;
}

// ═══════════════════════════════════════════════════════
// DRAW OFFICE
// ═══════════════════════════════════════════════════════
function drawOffice() {
  const L = daylight();
  const isDay = L > 0.7;
  const skyHi = isDay ? '#5a90d0' : '#0c0c1e';
  const skyLo = isDay ? '#98c8f0' : '#181830';

  // === CEILING ===
  px(0, 0, VW, WALL_TOP, tint('#e8e4dc', L));
  px(0, WALL_TOP - 1, VW, 1, tint('#d0c8b8', L));

  // Ceiling lights
  for (let lx = 60; lx < VW; lx += 120) {
    px(lx, WALL_TOP - 3, 50, 2, tint('#e0dcd0', L));
    px(lx + 2, WALL_TOP - 4, 46, 2, tint('#f4f0e4', L));
    // Light glow
    if (L < 0.8 || true) {
      px(lx + 4, WALL_TOP - 5, 42, 2, '#fffef4');
      ctx.fillStyle = `rgba(255,250,230,${0.03 * (2 - L)})`;
      ctx.fillRect(lx - 10, WALL_TOP, 70, WALL_BOT - WALL_TOP);
    }
  }

  // === WALL ===
  // Main wall - subtle gradient
  for (let wy = WALL_TOP; wy < WALL_BOT; wy++) {
    const t = (wy - WALL_TOP) / (WALL_BOT - WALL_TOP);
    px(0, wy, VW, 1, tint(lerpColor('#dcd4c4', '#d0c8b4', t), L));
  }
  // Wainscoting (lower wall panel)
  px(0, WALL_BOT - 20, VW, 20, tint('#c8c0a8', L));
  px(0, WALL_BOT - 20, VW, 1, tint('#b8b098', L));
  // Baseboard
  px(0, WALL_BOT - 2, VW, 3, tint('#8a7a58', L));

  // === WINDOWS ===
  const windowPositions = [50, 160, 285, 395];
  windowPositions.forEach(wx => {
    const ww = 52, wh = 48, wy = WALL_TOP + 8;
    // Window frame
    px(wx - 3, wy - 3, ww + 6, wh + 6, tint('#807050', L));
    px(wx - 2, wy - 2, ww + 4, wh + 4, tint('#988868', L));
    px(wx - 1, wy - 1, ww + 2, wh + 2, tint('#a89878', L));
    // Sky gradient
    for (let i = 0; i < wh; i++) {
      const t = i / wh;
      px(wx, wy + i, ww, 1, lerpColor(skyHi, skyLo, t));
    }
    // Window mullions
    px(wx + ww / 2 - 1, wy, 2, wh, tint('#988868', L));
    px(wx, wy + wh / 2 - 1, ww, 2, tint('#988868', L));
    // Window sill
    px(wx - 4, wy + wh + 1, ww + 8, 3, tint('#a89878', L));
    px(wx - 3, wy + wh + 4, ww + 6, 1, tint('#988868', L));
    // Stars at night
    if (!isDay) {
      const stars = [[8, 8], [30, 5], [18, 18], [40, 12], [12, 30], [35, 25]];
      stars.forEach(([sx, sy]) => {
        const bright = Math.sin(Date.now() / 1000 + sx * sy) * 0.3 + 0.7;
        ctx.fillStyle = `rgba(255,255,255,${bright * 0.7})`;
        ctx.fillRect(wx + sx, wy + sy, 1, 1);
      });
    }
    // Daylight reflection
    if (isDay) {
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(wx + 2, wy + 2, 8, 12);
    }
  });

  // === WALL DECORATIONS ===

  // Whiteboard (between windows 1&2)
  const wbx = 112, wby = WALL_TOP + 6;
  px(wbx, wby, 44, 30, tint('#d0d0d0', L));
  px(wbx + 1, wby + 1, 42, 28, tint('#f6f6f6', L));
  // Whiteboard content
  px(wbx + 4, wby + 5, 16, 1, tint('#4060c0', L));
  px(wbx + 4, wby + 8, 24, 1, tint('#c04040', L));
  px(wbx + 4, wby + 11, 12, 1, tint('#40a040', L));
  px(wbx + 4, wby + 14, 20, 1, tint('#c0a020', L));
  // Sticky notes on whiteboard
  px(wbx + 30, wby + 4, 8, 7, tint('#fff480', L));
  px(wbx + 30, wby + 14, 8, 7, tint('#80d0ff', L));
  px(wbx + 22, wby + 18, 8, 7, tint('#ff9090', L));
  // Whiteboard markers tray
  px(wbx + 5, wby + 28, 20, 2, tint('#c0c0c0', L));
  px(wbx + 7, wby + 26, 3, 2, tint('#e04040', L));
  px(wbx + 12, wby + 26, 3, 2, tint('#4040e0', L));
  px(wbx + 17, wby + 26, 3, 2, tint('#40a040', L));

  // Wall clock (between windows 2&3)
  const clkx = 230, clky = WALL_TOP + 12;
  px(clkx, clky, 14, 14, tint('#e8e4dc', L));
  px(clkx + 1, clky + 1, 12, 12, tint('#faf8f4', L));
  // Clock hands
  const t = getTime();
  const hAngle = (t.h % 12 + t.m / 60) / 12 * Math.PI * 2 - Math.PI / 2;

function drawPlant(x, y, size) {
  const L = daylight();
  const sway = Math.sin(Date.now() / 3000 + x * 0.1) * 0.5;
  if (size === 'big') {
    // Pot
    px(x, y + 14, 10, 6, tint('#b06830', L));
    px(x - 1, y + 20, 12, 2, tint('#905020', L));
    px(x + 1, y + 14, 8, 1, tint('#c07838', L));
    // Stem
    px(x + 4, y + 4, 2, 10, tint('#4a6030', L));
    // Leaves
    const lc = tint('#3a9a3a', L), lc2 = tint('#50b050', L), lc3 = tint('#2a8a2a', L);
    px(x - 2 + sway, y - 4, 6, 4, lc);
    px(x + 4 + sway, y - 6, 6, 4, lc2);
    px(x - 1 + sway, y, 8, 4, lc);
    px(x + 5 + sway, y - 1, 5, 4, lc3);
    px(x + 1 + sway, y + 3, 7, 3, lc2);
  } else {
    px(x, y + 4, 8, 4, tint('#b06830', L));
    px(x + 1, y, 6, 4, tint('#40b060', L));
    px(x + 2, y - 2, 4, 2, tint('#50c070', L));
  }
}

const SHIRTS = {
  purple: '#7c5cfc', blue: '#3060c0', green: '#2dd4a0', red: '#f0506e',
  yellow: '#ff9f43', orange: '#d06020', cyan: '#20a0b0', pink: '#c040a0'
};

class Agent {
  constructor(name, shirtColor, hairColor, role, sprite) {
    this.name = name;
    this.shirt = shirtColor;
    this.hair = hairColor || '#402010';
    this.skin = '#e8b880';
    this.pants = '#3a3a4a';
    this.role = role || 'Agent';
    this.spr = sprite || null;
    this.x = 60 + Math.random() * 360;
    this.y = WALK_Y_MIN + Math.random() * 30;
    this.tx = this.x;
    this.ty = this.y;
    this.spd = 0.3 + Math.random() * 0.15;
    this.dir = 1;
    this.animFrame = 0;
    this.animTimer = 0;
    this.state = 'idle'; // idle, walking, working, sitting
    this.status = 'idle'; // idle, working, offline
    this.task = '';
    this.taskProgress = 0;
    this.taskDuration = 0;
    this.bubble = '';
    this.bubbleTimer = 0;
    this.hasCoffee = false;
    this.idleTimer = 0;
    this.nextIdle = 3 + Math.random() * 8;
    this._pendingAction = null;
    this.deskIdx = null;
    this.log_ = [];
    this.log('Arrived at the office');
  }

  log(msg) {
    const t = getTime();
    this.log_.unshift({
      time: `${String(t.h).padStart(2, '0')}:${String(t.m).padStart(2, '0')}`,
      msg
    });
    if (this.log_.length > 50) this.log_.pop();
  }

  say(text, duration) {
    this.bubble = text;
    this.bubbleTimer = duration || 4;
  }

  assignTask(task) {
    this.task = task;
    this.status = 'working';
    this.state = 'walking';
    this.taskProgress = 0;
    this.taskDuration = 20 + Math.random() * 40;
    // Walk to a random desk
    const deskPositions = [42, 130, 240, 370];
    this.deskIdx = Math.random() * deskPositions.length | 0;
    const dx = deskPositions[this.deskIdx];
    this.tx = dx + 18;
    this.ty = WALL_BOT + 28;
    this.say('On it! 💻', 3);
    this.log('Started: ' + task);
    updAgentBar();
  }

  makeIdle() {
    this.status = 'idle';
    this.state = 'idle';
    this.task = '';
    this.taskProgress = 0;
    this.deskIdx = null;
    this.nextIdle = 2 + Math.random() * 5;
    this.idleTimer = 0;
    this.log('Now idle');
    updAgentBar();
  }

  makeOffline() {
    this.status = 'offline';
    this.state = 'idle';
    this.task = '';
    this.log('Went offline');
    updAgentBar();
  }

  update(dt) {
    this.animTimer += dt;
    if (this.animTimer > 0.18) {
      this.animFrame = (this.animFrame + 1) % 4;
      this.animTimer = 0;
    }
    if (this.bubbleTimer > 0) {
      this.bubbleTimer -= dt;
      if (this.bubbleTimer <= 0) this.bubble = '';
    }
    if (this.status === 'offline') return;

    // Movement
    if (this.state === 'walking') {
      const dx = this.tx - this.x;
      const dy = this.ty - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 1) {
        this.dir = dx > 0 ? 1 : -1;
        const s = this.spd * dt * 60;
        this.x += dx / dist * s;
        this.y += dy / dist * s;
      } else {
        this.x = this.tx;
        this.y = this.ty;
        this.onArrive();
      }
    }

    // Idle behavior
    if (this.status === 'idle' && this.state !== 'walking') {
      this.idleTimer += dt;
      if (this.idleTimer >= this.nextIdle) {
        this.pickIdleAction();
        this.idleTimer = 0;
        this.nextIdle = 5 + Math.random() * 12;
      }
    }

    // Working progress
    if (this.status === 'working' && this.state === 'working') {
      this.taskProgress += dt / this.taskDuration;
      if (this.taskProgress >= 1) {
        this.say('Done! ✅', 3);
        this.log('Completed: ' + this.task);
        showToast(`${this.name} finished: ${this.task}`);
        this.makeIdle();
      }
    }
  }

  onArrive() {
    if (this.status === 'working') {
      this.state = 'working';
      return;
    }
    if (this._pendingAction === 'coffee') {
      this.state = 'idle';
      this.say('☕ Ahh', 3);
      this.hasCoffee = true;
      this.log('Got coffee');
      setTimeout(() => { this.hasCoffee = false; }, 8000);
    } else if (this._pendingAction === 'couch') {
      this.state = 'sitting';
      this.say('😌', 2);
      this.log('Taking a break');
    } else {
      this.state = 'idle';
    }
    this._pendingAction = null;
  }

  pickIdleAction() {
    const actions = ['wander', 'wander', 'coffee', 'couch', 'wander', 'wander'];
    const action = actions[Math.random() * actions.length | 0];
    this._pendingAction = action;
    this.state = 'walking';
    if (action === 'coffee') {
      this.tx = 20 + Math.random() * 20;
      this.ty = WALK_Y_MIN + 60 + Math.random() * 10;
    } else if (action === 'couch') {
      this.tx = 205 + Math.random() * 30;
      this.ty = WALK_Y_MIN + 55 + Math.random() * 10;
    } else {
      this.tx = 40 + Math.random() * 400;
      this.ty = WALK_Y_MIN + Math.random() * (WALK_Y_MAX - WALK_Y_MIN - 30);
    }
  }
}

// DRAW AGENT
// ═══════════════════════════════════════════════════════
function drawAgent(a) {
  const x = Math.round(a.x);
  const y = Math.round(a.y);
  const L = daylight();
  const isWalk = a.state === 'walking';
  const isSit = a.state === 'working' || a.state === 'sitting';
  const isMage = a.spr === 'mage';
  const legOff = isWalk ? Math.sin(a.animFrame * Math.PI / 2) * 2 : 0;

  if (a.status === 'offline') ctx.globalAlpha = 0.3;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(x + 6, y + 1, 7, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  const by = isSit ? y - 8 : y - 18;

  // === LEGS ===
  if (!isSit) {
    px(x + 2, by + 14, 3, 4 + legOff, tint(a.pants, L));
    px(x + 7, by + 14, 3, 4 - legOff, tint(a.pants, L));
    // Shoes
    px(x + 1, by + 18 + legOff, 4, 2, tint('#2a2020', L));
    px(x + 7, by + 18 - legOff, 4, 2, tint('#2a2020', L));
  } else {
    px(x + 1, by + 14, 4, 3, tint(a.pants, L));
    px(x + 7, by + 14, 4, 3, tint(a.pants, L));
  }

  // === BODY ===
  if (isMage) {
    // Robe
    px(x + 1, by + 6, 10, 8, tint(a.shirt, L));
    px(x, by + 10, 12, 4, tint(a.shirt, L));
    // Gold trim
    px(x + 1, by + 13, 10, 1, tint('#f0c040', L));
    // Robe detail
    px(x + 5, by + 7, 2, 6, tint('#6040d0', L));
  } else {
    px(x + 1, by + 6, 10, 8, tint(a.shirt, L));
    // Collar
    px(x + 3, by + 6, 6, 2, tint('#ffffff', L * 0.4 + 0.6));
  }

  // === ARMS ===
  const armBob = a.state === 'working' ? Math.sin(Date.now() / 200) * 1 : 0;
  const frontArm = a.dir > 0 ? x + 10 : x - 1;
  const backArm = a.dir > 0 ? x - 1 : x + 10;
  px(backArm, by + 7, 2, 5, tint(a.shirt, L));
  px(frontArm, by + 7, 2, 5 + (armBob | 0), tint(a.shirt, L));
  // Hands
  px(backArm, by + 12, 2, 1, tint(a.skin, L));
  px(frontArm, by + 12 + (armBob | 0), 2, 1, tint(a.skin, L));

  // === HEAD ===
  px(x + 1, by - 1, 10, 7, tint(a.skin, L));

  // === HAIR / HAT ===
  if (isMage) {
    // Wizard hat
    px(x, by - 2, 12, 2, tint(a.shirt, L));
    px(x + 1, by - 4, 10, 2, tint(a.shirt, L));
    px(x + 2, by - 6, 8, 2, tint(a.shirt, L));
    px(x + 3, by - 8, 6, 2, tint(a.shirt, L));
    px(x + 4, by - 9, 4, 1, tint(a.shirt, L));
    px(x + 5, by - 10, 2, 1, '#f0c040'); // star on tip
    // Hat brim highlight
    px(x, by - 2, 12, 1, tint('#9070ff', L));
  } else {
    px(x + 1, by - 2, 10, 2, tint(a.hair, L));
    const sideHair = a.dir > 0 ? x + 9 : x + 1;
    px(sideHair, by, 2, 3, tint(a.hair, L));
  }

  // === FACE ===
  const faceOff = a.dir > 0 ? 3 : 2;
  // Eyes
  px(x + faceOff + 1, by + 2, 2, 2, tint('#1a1a2a', L));
  px(x + faceOff + 5, by + 2, 2, 2, tint('#1a1a2a', L));
  // Eye highlights
  px(x + faceOff + 2, by + 2, 1, 1, 'rgba(255,255,255,0.5)');
  px(x + faceOff + 6, by + 2, 1, 1, 'rgba(255,255,255,0.5)');
  // Mouth
  px(x + 5, by + 5, 3, 1, tint('#c08060', L));

  // === HELD ITEMS ===
  if (a.hasCoffee) {
    const cupX = a.dir > 0 ? x + 12 : x - 4;
    px(cupX, by + 10, 3, 4, '#f0f0f0');
    px(cupX, by + 9, 3, 1, '#908070');
    // Steam
    if (Math.sin(Date.now() / 400) > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(cupX + 1, by + 7, 1, 1);
    }
  }

  // Mage staff (when not at desk)
  if (isMage && a.state !== 'working') {
    const staffX = a.dir > 0 ? x + 12 : x - 2;
    px(staffX, by - 4, 1, 18, tint('#705020', L));
    // Crystal on top
    const glow = Math.sin(Date.now() / 500) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(160,100,255,${glow})`;
    ctx.fillRect(staffX - 1, by - 6, 3, 3);
    ctx.fillStyle = `rgba(200,160,255,${glow * 0.5})`;
    ctx.fillRect(staffX, by - 7, 1, 1);
  }

  ctx.globalAlpha = 1;

  // === NAMETAG (drawn on same canvas, pixel-perfect) ===
  const tagY = by - (isMage ? 14 : 8);
  drawNametag(x + 6, tagY, a);

  // === SPEECH BUBBLE ===
  if (a.bubble) {
    drawBubble(x + 6, tagY - 8, a.bubble);
  } else if (a.state === 'working' && a.task) {
    const shortTask = a.task.length > 18 ? a.task.substring(0, 18) + '…' : a.task;
    drawBubble(x + 6, tagY - 8, shortTask);
  }
}

function drawNametag(cx, y, agent) {
  ctx.save();
  ctx.font = '4px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const metrics = ctx.measureText(agent.name);
  const tw = metrics.width;
  const pad = 3;
  const bgW = tw + pad * 2;
  const bgH = 7;
  const bx = cx - bgW / 2;
  const by = y - bgH / 2;

  // Background
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath();
  ctx.roundRect(bx, by, bgW, bgH, 2);
  ctx.fill();

  // Status dot
  const dotColor = agent.status === 'working' ? '#2dd4a0' : agent.status === 'offline' ? '#555' : '#ff9f43';
  ctx.fillStyle = dotColor;
  ctx.fillRect(bx + 2, y - 1, 2, 2);

  // Name text
  ctx.fillStyle = agent.status === 'working' ? 'rgba(45,212,160,0.9)'
    : agent.status === 'offline' ? 'rgba(100,100,100,0.5)'
    : 'rgba(255,255,255,0.75)';
  ctx.fillText(agent.name, cx + 2, y + 0.5);
  ctx.restore();
}

function drawBubble(cx, y, text) {
  ctx.save();
  ctx.font = '3px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const metrics = ctx.measureText(text);
  const tw = metrics.width;
  const pad = 3;
  const bgW = tw + pad * 2;
  const bgH = 6;
  const bx = cx - bgW / 2;
  const by = y - bgH / 2;

  // Bubble bg
  ctx.fillStyle = 'rgba(20,20,30,0.85)';
  ctx.beginPath();
  ctx.roundRect(bx, by, bgW, bgH, 2);
  ctx.fill();

  // Pointer
  ctx.beginPath();
  ctx.moveTo(cx - 2, by + bgH);
  ctx.lineTo(cx, by + bgH + 2);
  ctx.lineTo(cx + 2, by + bgH);
  ctx.fill();

  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.roundRect(bx, by, bgW, bgH, 2);
  ctx.stroke();

  // Text
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fillText(text, cx, y + 0.5);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
// RANDOM EVENTS
// ═══════════════════════════════════════════════════════
const randomEvents = [
  a => { a[0].say('☕ Coffee anyone?', 4); },
  a => { const i = Math.random() * a.length | 0; a[i].say(`Hey ${a[(i + 1) % a.length].name}! 👋`, 3); },
  a => { a[Math.random() * a.length | 0].say('😂', 3); },
  a => { a[Math.random() * a.length | 0].say('💡 Idea!', 3); },
  a => { a[Math.random() * a.length | 0].say('🎵', 3); },
  a => { a[Math.random() * a.length | 0].say('🤔 Hmm...', 3); },
  a => { const i = Math.random() * a.length | 0; a[i].say('BRB ☕', 2); a[i]._pendingAction = 'coffee'; a[i].state = 'walking'; a[i].tx = 20; a[i].ty = WALK_Y_MIN + 65; },
];
let nextEvent = 15 + Math.random() * 30;

// ═══════════════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════════════
function canvasXY(clientX, clientY) {
  const s = baseScale * camZ;
  return { x: (clientX - camX) / s, y: (clientY - camY) / s };
}

function hitAgent(mx, my) {
  for (let i = agents.length - 1; i >= 0; i--) {
    const a = agents[i];
    const by = (a.state === 'working' || a.state === 'sitting') ? a.y - 8 : a.y - 18;
    if (mx >= a.x - 6 && mx <= a.x + 18 && my >= by - 6 && my <= a.y + 6) return a;
  }
  return null;
}

let dragStart = null, dragCamStart = null, isDragging = false, tapAgent = null;
let pinchDist0 = 0, pinchZ0 = 1;

cv.addEventListener('pointerdown', e => {
  dragStart = { x: e.clientX, y: e.clientY };
  dragCamStart = { x: camX, y: camY };
  isDragging = false;
  tapAgent = hitAgent(...Object.values(canvasXY(e.clientX, e.clientY)));
}, { passive: true });

cv.addEventListener('pointermove', e => {
  if (!dragStart) return;
  const dx = e.clientX - dragStart.x;
  const dy = e.clientY - dragStart.y;
  if (Math.abs(dx) > 6 || Math.abs(dy) > 6) isDragging = true;
  if (isDragging) {
    camX = dragCamStart.x + dx;
    camY = dragCamStart.y + dy;
    clampCam(); applyTransform();
  }
}, { passive: true });

cv.addEventListener('pointerup', () => {
  if (!isDragging && tapAgent) openAgentPanel(tapAgent);
  else if (!isDragging) closePanel();
  dragStart = null; tapAgent = null;
}, { passive: true });

cv.addEventListener('pointercancel', () => { dragStart = null; }, { passive: true });

cv.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchDist0 = Math.sqrt(dx * dx + dy * dy);
    pinchZ0 = camZ;
  }
}, { passive: true });

cv.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (pinchDist0 > 0) {
      camZ = Math.max(0.5, Math.min(3, pinchZ0 * (d / pinchDist0)));
      clampCam(); applyTransform();
    }
  }
}, { passive: true });

cv.addEventListener('wheel', e => {
  e.preventDefault();
  const oz = camZ;
  camZ = Math.max(0.5, Math.min(3, camZ * (1 - e.deltaY * 0.001)));
  camX = e.clientX - (e.clientX - camX) * (camZ / oz);
  camY = e.clientY - (e.clientY - camY) * (camZ / oz);
  clampCam(); applyTransform();
}, { passive: false });

// ═══════════════════════════════════════════════════════
// UI: AGENT BAR
// ═══════════════════════════════════════════════════════
function updAgentBar() {
  document.getElementById('agentBar').innerHTML = agents.map((a, i) => {
    const emoji = a.spr === 'mage' ? '🧙‍♂️' : '👤';
    const sel = selAgent === a ? ' sel' : '';
    return `<div class="agent-chip${sel}" onclick="openAgentPanel(agents[${i}])">
      <div class="chip-avatar" style="background:${a.shirt}">${emoji}</div>
      <div class="chip-info">
        <div class="chip-name">${a.name}</div>
        <div class="chip-status ${a.status}">${a.status}</div>
      </div>
      <div class="chip-dot ${a.status}"></div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════
// UI: PANEL
// ═══════════════════════════════════════════════════════
const panel = document.getElementById('panel');
let selAgent = null;
let menuOpen = false;

function openAgentPanel(a) {
  selAgent = a;
  menuOpen = false;
  renderPanel();
  panel.classList.add('open');
  updAgentBar();
}

function closePanel() {
  panel.classList.remove('open');
  selAgent = null;
  menuOpen = false;
  updAgentBar();
}

function renderPanel() {
  if (!selAgent) return;
  const a = selAgent;
  const emoji = a.spr === 'mage' ? '🧙‍♂️' : '👤';
  const progressPct = a.status === 'working' ? Math.min(100, a.taskProgress * 100) : 0;

  document.getElementById('panelBody').innerHTML = `
    <div class="p-header">
      <div class="p-avatar" style="background:${a.spr === 'mage' ? 'linear-gradient(135deg,#7c5cfc,#5a3ad0)' : a.shirt}">${emoji}</div>
      <div>
        <div class="p-name">${a.name}</div>
        <div class="p-role">${a.role}</div>
      </div>
      <div class="p-close" onclick="closePanel()">✕</div>
    </div>

    <div class="p-badge ${a.status}">${a.status}</div>

    ${a.task ? `
    <div class="p-task-card">
      <span class="task-icon">📋</span>
      <div style="flex:1">
        <div>${a.task}</div>
        <div class="task-progress"><div class="task-progress-bar" style="width:${progressPct}%"></div></div>
      </div>
    </div>` : ''}

    <div class="p-section">
      <div class="p-label">Assign Task</div>
      <div class="p-input-row">
        <input class="p-input" id="taskInput" type="text" placeholder="What should they work on?"
          onkeydown="if(event.key==='Enter'){doAssignTask()}" />
        <button class="p-btn green" onclick="doAssignTask()">▶</button>
      </div>
    </div>

    <div class="p-section">
      <div class="p-label">Send Message</div>
      <div class="p-input-row">
        <input class="p-input" id="msgInput" type="text" placeholder="Say something..."
          onkeydown="if(event.key==='Enter'){doSendMsg()}" />
        <button class="p-btn accent" onclick="doSendMsg()">💬</button>
      </div>
    </div>

    <div class="p-actions">
      <button class="p-btn" onclick="if(selAgent){selAgent.makeIdle();renderPanel();updAgentBar()}">☕ Break</button>
      <button class="p-btn ${a.status === 'offline' ? 'green' : 'red'}" onclick="toggleOnline()">
        ${a.status === 'offline' ? '🟢 Online' : '🔴 Offline'}
      </button>
    </div>

    <div class="p-section p-log">
      <div class="p-label">Activity Log</div>
      ${a.log_.slice(0, 15).map(l =>
    `<div class="p-log-item"><span class="log-time">${l.time}</span><span>${l.msg}</span></div>`
  ).join('')}
    </div>`;
}

function doAssignTask() {
  const input = document.getElementById('taskInput');
  if (!input || !selAgent) return;
  const val = input.value.trim();
  if (!val) { showToast('Enter a task first'); return; }
  selAgent.assignTask(val);
  showToast(`📋 Task assigned to ${selAgent.name}`);
  renderPanel();
}

function doSendMsg() {
  const input = document.getElementById('msgInput');
  if (!input || !selAgent) return;
  const val = input.value.trim();
  if (!val) return;
  selAgent.say(val, 5);
  selAgent.log('Said: ' + val);
  input.value = '';
  renderPanel();
}

function toggleOnline() {
  if (!selAgent) return;
  if (selAgent.status === 'offline') {
    selAgent.status = 'idle';
    selAgent.state = 'idle';
    selAgent.log('Back online');
  } else {
    selAgent.makeOffline();
  }
  renderPanel();
  updAgentBar();
}

// ═══════════════════════════════════════════════════════
// UI: MENU
// ═══════════════════════════════════════════════════════
function toggleMenu() {
  if (menuOpen || selAgent) {
    closePanel();
    return;
  }
  menuOpen = true;
  selAgent = null;
  document.getElementById('panelBody').innerHTML = `
    <div class="p-header">
      <div style="font-size:16px">⚙️</div>
      <div><div class="p-name">Menu</div><div class="p-role">AI Office Controls</div></div>
      <div class="p-close" onclick="closePanel()">✕</div>
    </div>
    <div class="menu-item" onclick="showAllAgents()"><span class="m-icon">👥</span><span class="m-text">All Agents</span></div>
    <div class="menu-item" onclick="showAddModal()"><span class="m-icon">➕</span><span class="m-text">Add Agent</span></div>
    <div class="menu-item" onclick="showBroadcastModal()"><span class="m-icon">📢</span><span class="m-text">Broadcast Message</span></div>
    <div class="menu-item" onclick="assignAllBreak()"><span class="m-icon">☕</span><span class="m-text">Everyone — Break</span></div>`;
  panel.classList.add('open');
}

function showAllAgents() {
  menuOpen = false;
  document.getElementById('panelBody').innerHTML = `
    <div class="p-header">
      <div style="font-size:16px">👥</div>
      <div><div class="p-name">All Agents</div><div class="p-role">${agents.length} total</div></div>
      <div class="p-close" onclick="closePanel()">✕</div>
    </div>
    ${agents.map((a, i) => {
    const emoji = a.spr === 'mage' ? '🧙‍♂️' : '👤';
    return `<div class="menu-item" onclick="openAgentPanel(agents[${i}])">
        <div class="chip-avatar" style="background:${a.shirt};width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">${emoji}</div>
        <div style="flex:1"><div style="font-size:12px;font-weight:500">${a.name}</div><div style="font-size:10px;color:var(--text3)">${a.role}</div></div>
        <div class="p-badge ${a.status}" style="margin:0;font-size:8px">${a.status}</div>
      </div>`;
  }).join('')}`;
}

function showAddModal() {
  closePanel();
  const colors = Object.entries(SHIRTS);
  const m = document.createElement('div');
  m.className = 'modal-bg';
  m.onclick = e => { if (e.target === m) m.remove(); };
  m.innerHTML = `<div class="modal-card">
    <h2>➕ New Agent</h2>
    <div class="p-section"><div class="p-label">Name</div><input class="p-input" id="nName" placeholder="Agent name..." /></div>
    <div class="p-section"><div class="p-label">Role</div><input class="p-input" id="nRole" placeholder="Role..." /></div>
    <div class="p-section"><div class="p-label">Color</div>
      <div class="color-row">${colors.map(([n, c]) =>
    `<div class="csw${n === 'purple' ? ' sel' : ''}" data-color="${c}" style="background:${c}"
          onclick="document.querySelectorAll('.csw').forEach(s=>s.classList.remove('sel'));this.classList.add('sel')"></div>`
  ).join('')}</div>
    </div>
    <div class="btn-row">
      <button class="p-btn" onclick="this.closest('.modal-bg').remove()">Cancel</button>
      <button class="p-btn green" onclick="doAddAgent()">Add Agent</button>
    </div>
  </div>`;
  document.body.appendChild(m);
}

function doAddAgent() {
  const n = document.getElementById('nName')?.value.trim();
  const r = document.getElementById('nRole')?.value.trim();
  const s = document.querySelector('.csw.sel');
  if (!n) { showToast('Enter a name'); return; }
  const hairColors = ['#402010', '#804020', '#202020', '#c0a040', '#603010'];
  agents.push(new Agent(n, s ? s.dataset.color : '#888', hairColors[Math.random() * hairColors.length | 0], r || 'Agent'));
  document.querySelector('.modal-bg')?.remove();
  showToast('✅ ' + n + ' joined the office!');
  updAgentBar();
}

function showBroadcastModal() {
  closePanel();
  const m = document.createElement('div');
  m.className = 'modal-bg';
  m.onclick = e => { if (e.target === m) m.remove(); };
  m.innerHTML = `<div class="modal-card">
    <h2>📢 Broadcast Message</h2>
    <div class="p-section"><div class="p-label">Message to everyone</div>
      <input class="p-input" id="bMsg" placeholder="Hey everyone..."
        onkeydown="if(event.key==='Enter'){doBroadcast()}" />
    </div>
    <div class="btn-row">
      <button class="p-btn" onclick="this.closest('.modal-bg').remove()">Cancel</button>
      <button class="p-btn green" onclick="doBroadcast()">📢 Send</button>
    </div>
  </div>`;
  document.body.appendChild(m);
}

function doBroadcast() {
  const v = document.getElementById('bMsg')?.value.trim();
  if (!v) { showToast('Enter a message'); return; }
  agents.forEach(a => {
    if (a.status !== 'offline') {
      setTimeout(() => {
        a.say(v, 4);
        a.log('📢 ' + v);
      }, Math.random() * 800);
    }
  });
  document.querySelector('.modal-bg')?.remove();
  showToast('📢 Broadcast sent!');
}

function assignAllBreak() {
  closePanel();
  agents.forEach(a => {
    if (a.status !== 'offline') {
      a.makeIdle();
      a._pendingAction = 'coffee';
      a.state = 'walking';
      a.tx = 10 + Math.random() * 30;
      a.ty = WALK_Y_MIN + 60 + Math.random() * 15;
    }
  });
  showToast('☕ Everyone is on break!');
  updAgentBar();
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

// ═══════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closePanel();
    document.querySelector('.modal-bg')?.remove();
  }
});

// ═══════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════
let lastTime = 0;
let panelRefreshTimer = 0;

function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.1);
  lastTime = ts;

  // Update clock
  const t = getTime();
  document.getElementById('clock').textContent =
    `${String(t.h).padStart(2, '0')}:${String(t.m).padStart(2, '0')}`;

  // Random events
  nextEvent -= dt;
  if (nextEvent <= 0) {
    const activeAgents = agents.filter(a => a.status !== 'offline');
    if (activeAgents.length) {
      randomEvents[Math.random() * randomEvents.length | 0](activeAgents);
    }
    nextEvent = 20 + Math.random() * 40;
  }

  // Update agents
  agents.forEach(a => a.update(dt));

  // Draw
  ctx.clearRect(0, 0, VW, VH);
  drawOffice();

  // Sort agents by Y for proper layering
  const sorted = [...agents].sort((a, b) => a.y - b.y);
  sorted.forEach(a => drawAgent(a));

  // Refresh panel periodically (for progress bar)
  panelRefreshTimer += dt;
  if (panelRefreshTimer > 1 && selAgent && !menuOpen) {
    panelRefreshTimer = 0;
    // Only update progress bar and status without re-rendering whole panel
    const progBar = document.querySelector('.task-progress-bar');
    if (progBar && selAgent.status === 'working') {
      progBar.style.width = `${Math.min(100, selAgent.taskProgress * 100)}%`;
    }
    const badge = document.querySelector('.p-badge');
    if (badge) {
      badge.className = `p-badge ${selAgent.status}`;
      badge.textContent = selAgent.status;
    }
  }

  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
initFloor();
resize();
updAgentBar();

window.addEventListener('load', () => {
  setTimeout(() => {
    const loading = document.getElementById('loading');
    loading.classList.add('hide');
    setTimeout(() => loading.remove(), 500);
  }, 800);
});

requestAnimationFrame(loop);
</script>
